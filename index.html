<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

  <title>JARVIS</title>

  <!-- 🔥 FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:#020a14;
      --surface:#050f1e;
      --border:#0a2040;
      --accent:#00d4ff;
      --accent2:#0066cc;
      --text:#c8e8ff;
      --dim:#4a7a9b;
      --glow:0 0 20px rgba(0,212,255,0.3);

      /* FONT SYSTEM */
      --font-ai:'Orbitron', sans-serif;
      --font-body:'Rajdhani', sans-serif;
      --font-mono:'Share Tech Mono', monospace;
    }

    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      background:var(--bg);
      color:var(--text);
      font-family:var(--font-body);
      height:100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    /* HEADER */
    #header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      border-bottom:1px solid var(--border);
    }

    .logo {
      font-family:var(--font-ai);
      letter-spacing:5px;
      font-size:16px;
      color:var(--accent);
      text-shadow:var(--glow);
    }

    .status {
      font-family:var(--font-mono);
      font-size:11px;
      color:var(--dim);
    }

    /* CHAT AREA */
    #chat {
      flex:1;
      overflow:auto;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .msg {
      max-width:85%;
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
      line-height:1.5;
    }

    .user {
      align-self:flex-end;
      background:rgba(0,102,204,0.25);
      border:1px solid var(--accent2);
      font-family:var(--font-body);
    }

    .ai {
      align-self:flex-start;
      background:rgba(0,212,255,0.05);
      border:1px solid var(--border);
      font-family:var(--font-body);
      text-shadow:0 0 10px rgba(0,212,255,0.15);
    }

    /* INPUT */
    #inputBar {
      display:flex;
      gap:8px;
      padding:10px;
      border-top:1px solid var(--border);
      align-items:center;
    }

    #userInput {
      flex:1;
      padding:12px;
      border-radius:25px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      outline:none;
      font-family:var(--font-body);
      transition:0.2s;
    }

    #userInput:focus {
      border-color:var(--accent);
      box-shadow:0 0 15px rgba(0,212,255,0.25);
    }

    .btn {
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid var(--border);
      background:rgba(0,212,255,0.08);
      color:var(--accent);
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.2s;
      font-size:16px;
    }

    .btn:hover {
      box-shadow:var(--glow);
    }

    .recording {
      border-color:red !important;
      color:red !important;
      box-shadow:0 0 15px rgba(255,0,0,0.3);
    }

    /* MONO SYSTEM TEXT */
    .sys {
      font-family:var(--font-mono);
      font-size:11px;
      color:var(--dim);
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">J.A.R.V.I.S</div>
  <div class="status">ONLINE • READY</div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="inputBar">
  <input id="userInput" type="text" placeholder="Ask JARVIS..."
    onkeydown="if(event.key==='Enter') sendMessage(this.value)"/>

  <div class="btn" id="micBtn" onclick="toggleMic()">🎤</div>
  <div class="btn" onclick="sendMessage(document.getElementById('userInput').value)">➤</div>
</div>

<script>
/* ───────── CHAT ───────── */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

/* ───────── SEND ───────── */
async function sendMessage(text) {
  if (!text) return;

  addMsg(text, "user");
  document.getElementById("userInput").value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await res.json();
  addMsg(data.reply, "ai");
}

/* ───────── VOICE SYSTEM ───────── */
let rec;
let listening = false;

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("Voice not supported");

  if (listening) {
    rec.stop();
    return;
  }

  rec = new SR();
  rec.lang = "en-US";

  rec.onstart = () => {
    listening = true;
    document.getElementById("micBtn").classList.add("recording");
  };

  rec.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById("userInput").value = text;
    sendMessage(text);
  };

  rec.onerror = stopMic;
  rec.onend = stopMic;

  rec.start();
}

function stopMic() {
  listening = false;
  document.getElementById("micBtn").classList.remove("recording");
}
</script>

</body>
</html>
