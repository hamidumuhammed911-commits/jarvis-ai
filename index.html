<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="JARVIS"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#020a14"/>
  <title>JARVIS</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    :root {
      --bg:      #020a14;
      --surface: #050f1e;
      --border:  #0a2040;
      --accent:  #00d4ff;
      --accent2: #0066cc;
      --danger:  #ff3333;
      --text:    #c8e8ff;
      --dim:     #4a7a9b;
      --glow:    0 0 20px rgba(0,212,255,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── LOCK SCREEN ── */
    #lockScreen {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    #lockScreen.hidden { display: none; }
    .lock-title  { font-size: 13px; letter-spacing: 6px; color: var(--accent); opacity: 0.8; }
    .lock-logo   { font-size: 28px; font-weight: bold; letter-spacing: 4px; color: var(--accent); text-shadow: var(--glow); }
    .lock-subtitle { font-size: 10px; letter-spacing: 3px; color: var(--dim); margin-top: -18px; }
    .lock-dots   { display: flex; gap: 12px; margin: 8px 0; }
    .lock-dot    { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--accent); background: transparent; transition: background 0.15s, box-shadow 0.15s; }
    .lock-dot.filled { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .lock-grid   { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 220px; }
    .lock-key    { background: rgba(0,212,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 20px; font-weight: bold; padding: 16px; cursor: pointer; transition: background 0.1s, border-color 0.1s; user-select: none; }
    .lock-key:active, .lock-key:hover { background: rgba(0,212,255,0.15); border-color: var(--accent); }
    .lock-del    { font-size: 14px; }
    #lockError   { font-size: 11px; letter-spacing: 3px; color: var(--danger); min-height: 16px; }
    .lock-voice-btn { background: transparent; border: 1px solid var(--border); border-radius: 24px; padding: 10px 24px; color: var(--dim); font-family: inherit; font-size: 11px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
    .lock-voice-btn.listening { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 12px rgba(255,51,51,0.3); }
    #lockVoiceStatus { font-size: 10px; letter-spacing: 2px; color: var(--dim); min-height: 14px; }

    /* ── HEADER ── */
    #header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-logo { font-size: 15px; font-weight: bold; letter-spacing: 4px; color: var(--accent); text-shadow: var(--glow); }
    .header-status { display: flex; align-items: center; gap: 6px; font-size: 9px; letter-spacing: 2px; color: var(--dim); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 6px #00ff88; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #locationBadge { font-size: 9px; color: var(--dim); letter-spacing: 1px; display: none; transition: all 0.3s; }

    /* ── MESSAGES ── */
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); }
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 40px 0; color: var(--dim); }
    .welcome-orb { width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--border); background: radial-gradient(circle at 35% 35%, rgba(0,212,255,0.15), transparent 70%); display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 8px; box-shadow: 0 0 30px rgba(0,212,255,0.1); animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe { 0%,100% { box-shadow: 0 0 20px rgba(0,212,255,0.1); } 50% { box-shadow: 0 0 40px rgba(0,212,255,0.25); } }
    .welcome-text { font-size: 11px; letter-spacing: 3px; }
    .welcome-sub  { font-size: 9px; letter-spacing: 2px; opacity: 0.5; }
    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 88%; animation: msgIn 0.25s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.ai   { align-self: flex-start; }
    .msg-label { font-size: 9px; letter-spacing: 2px; color: var(--dim); padding: 0 4px; display: flex; align-items: center; gap: 6px; }
    .live-badge { font-size: 8px; color: #ff4444; letter-spacing: 1px; opacity: 0.8; }
    .wa-badge   { font-size: 8px; color: #25D366; letter-spacing: 1px; opacity: 0.8; }
    .app-badge  { font-size: 8px; color: var(--accent); letter-spacing: 1px; opacity: 0.8; }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; border: 1px solid var(--border); }
    .msg.user .msg-bubble { background: rgba(0,102,204,0.2); border-color: var(--accent2); }
    .msg.ai   .msg-bubble { background: rgba(0,212,255,0.05); border-color: var(--border); }

    /* ── THINKING DOTS ── */
    .thinking-bubble { display: flex; gap: 5px; padding: 14px 18px; background: rgba(0,212,255,0.05); border: 1px solid var(--border); border-radius: 12px; align-items: center; }
    .thinking-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.4; animation: think 1.2s infinite; }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes think { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

    /* ── INPUT BAR ── */
    #inputBar { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; align-items: center; }
    #userInput { flex: 1; background: rgba(0,212,255,0.05); border: 1px solid var(--border); border-radius: 24px; color: var(--text); font-family: inherit; font-size: 13px; padding: 10px 16px; outline: none; transition: border-color 0.2s; }
    #userInput:focus { border-color: var(--accent2); }
    #userInput::placeholder { color: var(--dim); }
    .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,212,255,0.08); border: 1px solid var(--border); color: var(--accent); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; user-select: none; }
    .icon-btn:active, .icon-btn.active { background: rgba(0,212,255,0.2); border-color: var(--accent); box-shadow: var(--glow); }
    .icon-btn.recording { background: rgba(255,51,51,0.15); border-color: var(--danger); animation: recPulse 1s infinite; }
    @keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,51,51,0.4); } 50% { box-shadow: 0 0 0 8px rgba(255,51,51,0); } }
    #sendBtn { background: rgba(0,212,255,0.12); border-color: var(--accent2); }

    /* ── TAP ORB ── */
    #tapArea { padding: 10px 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
    #tapBtn { width: 64px; height: 64px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(0,212,255,0.25), rgba(0,50,100,0.4)); border: 2px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 3px; transition: all 0.2s; box-shadow: 0 0 20px rgba(0,212,255,0.15); user-select: none; }
    #tapBtn:active, #tapBtn.speaking { transform: scale(0.93); }
    #tapBtn.listening { border-color: var(--danger); box-shadow: 0 0 30px rgba(255,51,51,0.4); animation: tapPulse 1s infinite; }
    @keyframes tapPulse { 0%,100% { box-shadow: 0 0 20px rgba(255,51,51,0.3); } 50% { box-shadow: 0 0 40px rgba(255,51,51,0.6); } }
    #tapIcon  { font-size: 22px; }
    #tapLabel { font-size: 8px; letter-spacing: 2px; color: var(--dim); }

    /* ── LIVE MODE OVERLAY ── */
    #liveOverlay { position: fixed; inset: 0; z-index: 100; background: rgba(2,10,20,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    #liveOverlay.active { display: flex; }
    #liveOrb { width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--accent); background: radial-gradient(circle at 35% 35%, rgba(0,212,255,0.2), transparent 70%); display: flex; align-items: center; justify-content: center; font-size: 48px; transition: all 0.3s; }
    #liveOrb.listening { animation: orbPulse 1s infinite; }
    #liveOrb.thinking  { animation: orbSpin 2s linear infinite; opacity: 0.7; }
    #liveOrb.speaking  { box-shadow: 0 0 60px rgba(0,212,255,0.5); }
    @keyframes orbPulse { 0%,100% { box-shadow: 0 0 20px rgba(255,51,51,0.3); border-color: #ff4444; } 50% { box-shadow: 0 0 50px rgba(255,51,51,0.6); } }
    @keyframes orbSpin  { from { border-top-color: var(--accent); border-right-color: transparent; } to { transform: rotate(360deg); } }
    #liveLabel { font-size: 11px; letter-spacing: 4px; color: var(--dim); }
    #liveText  { font-size: 13px; color: var(--text); text-align: center; max-width: 300px; line-height: 1.6; min-height: 40px; padding: 0 20px; }
    #liveMicDead { font-size: 10px; color: var(--danger); letter-spacing: 2px; display: none; }
    .live-controls { display: flex; gap: 16px; }
    #muteBtn { background: rgba(255,51,51,0.1); border: 1px solid rgba(255,51,51,0.3); color: #ff8888; }
    #endBtn  { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  </style>
</head>
<body>

<!-- ═══════════════ LOCK SCREEN ═══════════════ -->
<div id="lockScreen">
  <div class="lock-title">J.A.R.V.I.S</div>
  <div class="lock-logo">◈ JARVIS ◈</div>
  <div class="lock-subtitle">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
  <div class="lock-dots">
    <div class="lock-dot" id="d0"></div>
    <div class="lock-dot" id="d1"></div>
    <div class="lock-dot" id="d2"></div>
    <div class="lock-dot" id="d3"></div>

    <button class="lock-key" onclick="lockKey('5')">5</button>
    <button class="lock-key" onclick="lockKey('6')">6</button>

<!-- ═══════════════ HEADER ═══════════════ -->
<div id="header">

  <div id="locationBadge">📍 <span id="locationCity"></span></div>
  <div class="header-status">
    <div class="status-dot"></div>

  </div>
</div>

<!-- ═══════════════ MESSAGES ═══════════════ -->
<div id="messages">
  <div class="welcome">
    <div class="welcome-orb">🤖</div>
    <div class="welcome-text">READY FOR YOUR COMMAND</div>
    <div class="welcome-sub">TAP THE ORB OR TYPE BELOW</div>
  </div>
</div>

<!-- ═══════════════ TAP ORB ═══════════════ -->
<div id="tapArea">
  <div id="tapBtn" onclick="tapSpeak()">
    <div id="tapIcon">🎙️</div>
    <div id="tapLabel">TAP TO SPEAK</div>
  </div>
</div>

<!-- ═══════════════ INPUT BAR ═══════════════ -->
<div id="inputBar">
  <input id="userInput" type="text" placeholder="Ask JARVIS..." autocomplete="off"
    onkeydown="if(event.key==='Enter')sendMessage(this.value)"/>
  <div class="icon-btn" id="micBtn" onclick="toggleMic()">🎤</div>
  <div class="icon-btn" id="sendBtn" onclick="sendMessage(document.getElementById('userInput').value)">➤</div>

</div>

<!-- ═══════════════ LIVE MODE OVERLAY ═══════════════ -->
<div id="liveOverlay">
  <div id="liveOrb">🎙️</div>
  <div id="liveLabel">LISTENING</div>
  <div id="liveText">Ready, Boss Muhammed Aali.</div>
  <div id="liveMicDead">⚠ MIC LOST — TAP ORB TO RESTART</div>
  <div class="live-controls">
    <div class="icon-btn" id="muteBtn" onclick="toggleMute()">🔇</div>
    <div class="icon-btn" id="endBtn" onclick="endLiveMode()">✕ END</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// JARVIS — Complete Frontend (all 4 features integrated)
// ═══════════════════════════════════════════════════════════════

const PASSCODE = '615113';

// ── LOCK SCREEN ─────────────────────────────────────────────────
let lockInput = '';
const LOCK_LEN = 6;

function lockKey(d) {
  if (lockInput.length >= LOCK_LEN) return;
  lockInput += d;
  updateDots();
  if (lockInput.length === LOCK_LEN) setTimeout(checkCode, 100);
}

function lockDel() {
  lockInput = lockInput.slice(0, -1);
  updateDots();
  document.getElementById('lockError').textContent = '';
}

function updateDots() {
  for (let i = 0; i < LOCK_LEN; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < lockInput.length);
  }
}

function checkCode() {
  if (lockInput === PASSCODE) {
    unlockAndStart();
  } else {
    document.getElementById('lockError').textContent = 'ACCESS DENIED';
    for (let i = 0; i < LOCK_LEN; i++) document.getElementById('d' + i).classList.remove('filled');
    setTimeout(() => {
      lockInput = '';
      updateDots();
      document.getElementById('lockError').textContent = '';
    }, 1000);
  }
}

// ── VOICE UNLOCK ─────────────────────────────────────────────────
let lockVoiceRec = null;

function lockVoiceUnlock() {
  const btn    = document.getElementById('lockVoiceBtn');
  const status = document.getElementById('lockVoiceStatus');
  const SR2    = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR2) { document.getElementById('lockError').textContent = 'VOICE NOT SUPPORTED'; return; }

  if (lockVoiceRec) {
    lockVoiceRec.stop(); lockVoiceRec = null;
    btn.className = 'lock-voice-btn'; btn.textContent = '🎤 SPEAK CODE';
    status.textContent = ''; return;
  }

  lockVoiceRec = new SR2();
  lockVoiceRec.lang = 'en-US'; lockVoiceRec.interimResults = false;

  lockVoiceRec.onstart = () => {
    btn.classList.add('listening'); btn.textContent = '🔴 LISTENING...';
    status.textContent = 'SAY YOUR CODE NOW';
  };

  lockVoiceRec.onresult = (e) => {
    const said   = e.results[0][0].transcript.trim();
    const digits = said.replace(/\s+/g, '')
      .replace(/zero/gi,'0').replace(/one/gi,'1').replace(/two/gi,'2')
      .replace(/three/gi,'3').replace(/four/gi,'4').replace(/five/gi,'5')
      .replace(/six/gi,'6').replace(/seven/gi,'7').replace(/eight/gi,'8')
      .replace(/nine/gi,'9').replace(/[^0-9]/g, '');

    lockVoiceRec = null;
    btn.className = 'lock-voice-btn'; btn.textContent = '🎤 SPEAK CODE';
    status.textContent = '';

    lockInput = digits.slice(0, LOCK_LEN);
    updateDots();
    if (lockInput.length === LOCK_LEN) checkCode();
    else {
      document.getElementById('lockError').textContent = 'ACCESS DENIED';
      setTimeout(() => { lockInput = ''; updateDots(); document.getElementById('lockError').textContent = ''; }, 1200);
    }
  };

  lockVoiceRec.onerror = () => {
    lockVoiceRec = null;
    btn.className = 'lock-voice-btn'; btn.textContent = '🎤 SPEAK CODE';
    status.textContent = '';
    document.getElementById('lockError').textContent = 'MIC ERROR — TRY AGAIN';
  };

  lockVoiceRec.onend = () => {
    if (lockVoiceRec) { lockVoiceRec = null; btn.className = 'lock-voice-btn'; btn.textContent = '🎤 SPEAK CODE'; status.textContent = ''; }
  };

  try { lockVoiceRec.start(); } catch(e) { lockVoiceRec = null; }
}

// ── UNLOCK + START ───────────────────────────────────────────────
function unlockAndStart() {
  document.getElementById('lockScreen').classList.add('hidden');
  startLocationEngine();
}

// ── ① LOCATION ENGINE ────────────────────────────────────────────
let liveLocation = null;

function startLocationEngine() {
  if (!navigator.geolocation) return;
  const opts = { enableHighAccuracy: false, timeout: 8000, maximumAge: 300000 };

  async function updateLocation(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    liveLocation = { lat, lon };

    try {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
        { headers: { 'Accept-Language': 'en' } }
      );
      const d = await r.json();
      const city    = d.address?.city || d.address?.town || d.address?.village || '';
      const country = d.address?.country || '';
      liveLocation.city    = city;
      liveLocation.country = country;

      if (city) {
        document.getElementById('locationCity').textContent = city.toUpperCase();
        document.getElementById('locationBadge').style.display = 'block';
      }
    } catch (_) {}
  }

  navigator.geolocation.getCurrentPosition(updateLocation, () => {}, opts);
  setInterval(() => navigator.geolocation.getCurrentPosition(updateLocation, () => {}, opts), 10 * 60 * 1000);
}

// ── TTS ──────────────────────────────────────────────────────────
let ttsVoice  = null;
let ttsReady  = false;
let liveMuted = false;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return false;
  ttsVoice =
    voices.find(v => /female|woman|girl/i.test(v.name) && /en/i.test(v.lang)) ||
    voices.find(v => /zira|samantha|victoria|karen|moira|tessa|fiona|allison|ava|susan|kate/i.test(v.name)) ||
    voices.find(v => /en[-_]?(gb|us|au|in)/i.test(v.lang) && v.name.toLowerCase().includes('female')) ||
    voices.find(v => /en/i.test(v.lang)) ||
    voices[0];
  ttsReady = true;
  return true;
}

if (!loadVoices()) {
  speechSynthesis.onvoiceschanged = () => { loadVoices(); };
}

function speak(text) {
  if (liveMuted) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (ttsVoice) utt.voice = ttsVoice;
  utt.rate  = 1.0;
  utt.pitch = 1.1;
  utt.volume= 1.0;

  utt.onstart = () => {
    tapBtn.classList.add('speaking');
    if (liveMode) { liveOrb.className = 'speaking'; liveLabel.textContent = 'SPEAKING'; }
  };
  utt.onend = utt.onerror = () => {
    tapBtn.classList.remove('speaking');
    if (liveMode) listenLoop();
  };
  speechSynthesis.speak(utt);
}

// ── ELEMENTS ─────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const userInput  = document.getElementById('userInput');
const tapBtn     = document.getElementById('tapBtn');
const tapIcon    = document.getElementById('tapIcon');
const tapLabel   = document.getElementById('tapLabel');
const liveOverlay= document.getElementById('liveOverlay');
const liveOrb    = document.getElementById('liveOrb');
const liveLabel  = document.getElementById('liveLabel');
const liveText   = document.getElementById('liveText');
const endBtn     = document.getElementById('endBtn');

let history  = [];
let busy     = false;
let liveMode = false;
let liveRec  = null;
const SR     = window.SpeechRecognition || window.webkitSpeechRecognition;

// ── MESSAGES ─────────────────────────────────────────────────────
function clearWelcome() { document.querySelector('.welcome')?.remove(); }

function addMsg(role, text, badge) {
  clearWelcome();
  const d = document.createElement('div');
  d.className = `msg ${role === 'user' ? 'user' : 'ai'}`;

  let badgeHtml = '';
  if (badge === 'live')      badgeHtml = '<span class="live-badge">🔴 LIVE</span>';
  else if (badge === 'wa')   badgeHtml = '<span class="wa-badge">💬 WHATSAPP</span>';
  else if (badge === 'app')  badgeHtml = '<span class="app-badge">📱 APP</span>';

  d.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'YOU' : 'JARVIS'} ${badgeHtml}</div>
    <div class="msg-bubble">${text}</div>
  `;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'msg ai'; t.id = 'typing';
  t.innerHTML = `<div class="msg-label">JARVIS</div><div class="thinking-bubble"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>`;
  messagesEl.appendChild(t);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

// ── ③ WHATSAPP ────────────────────────────────────────────────────
// ▼▼ ADD YOUR CONTACTS HERE ▼▼
const WA_CONTACTS = {
  // 'mum':   '923001234567',
  // 'dad':   '923007654321',
  // 'ali':   '923331234567',
};

function detectWhatsAppIntent(text) {
  const patterns = [
    /(?:send\s+)?(?:a\s+)?(?:whatsapp|wa|wapp)\s+(?:message\s+)?(?:to\s+)?(\w+)(?:\s+(?:saying?|that|:)\s*(.+))?/i,
    /(?:message|text|ping)\s+(\w+)\s+on\s+(?:whatsapp|wa)/i,
    /(?:tell|ask)\s+(\w+)\s+(?:on\s+whatsapp|via\s+whatsapp)(?:\s+(?:that|to)\s*(.+))?/i,
  ];
  for (const pat of patterns) {
    const m = text.match(pat);
    if (m) return { name: m[1]?.toLowerCase(), msg: m[2] || '', original: text };
  }
  return null;
}

function handleWhatsApp({ name, msg }) {
  const phone = WA_CONTACTS[name];
  if (!phone) {
    const known = Object.keys(WA_CONTACTS).join(', ') || 'none configured yet';
    const reply = `I don't have a WhatsApp contact for "${name}", Sir. Known contacts: ${known}.`;
    addMsg('ai', reply, 'wa');
    speak(reply);
    history.push({ role: 'assistant', content: reply });
    return;
  }
  const waUrl = `https://wa.me/${phone}${msg ? '?text=' + encodeURIComponent(msg) : ''}`;
  const reply = msg
    ? `Opening WhatsApp for ${name} with your message pre-filled, Sir.`
    : `Opening WhatsApp chat with ${name}, Sir.`;
  addMsg('ai', reply, 'wa');
  speak(reply);
  history.push({ role: 'assistant', content: reply });
  setTimeout(() => window.open(waUrl, '_blank'), 800);
}

// ── ④ TASKER ──────────────────────────────────────────────────────
const TASKER_BASE = 'http://localhost:1820/run';

// ▼▼ MUST MATCH YOUR TASKER TASK NAMES EXACTLY ▼▼
const TASKER_APPS = {
  'youtube':          'Open YouTube',
  'camera':           'Open Camera',
  'settings':         'Open Settings',
  'maps|navigation':  'Open Maps',
  'spotify|music':    'Open Spotify',
  'chrome|browser':   'Open Chrome',
  'calculator':       'Open Calculator',
  'gallery|photos':   'Open Gallery',
  'contacts':         'Open Contacts',
  'dialer|phone':     'Open Phone',
  'calendar':         'Open Calendar',
  'files':            'Open Files',
};

function detectTaskerIntent(text) {
  const m = text.match(/(?:open|launch|start|switch\s+to|go\s+to)\s+(\w[\w\s]*)/i);
  if (!m) return null;
  const appQuery = m[1].trim().toLowerCase();
  for (const [pattern, taskName] of Object.entries(TASKER_APPS)) {
    if (new RegExp(pattern, 'i').test(appQuery)) return { appQuery, taskName };
  }
  return null;
}

async function handleTasker({ appQuery, taskName }) {
  const reply = `Opening ${appQuery} for you, Sir.`;
  addMsg('ai', reply, 'app');
  speak(reply);
  history.push({ role: 'assistant', content: reply });
  try {
    await fetch(`${TASKER_BASE}?taskName=${encodeURIComponent(taskName)}`, { signal: AbortSignal.timeout(3000) });
  } catch (_) {}
}

// ── ① + ② SEND MESSAGE (with real-time search + location) ────────
async function sendMessage(text) {
  if (!text?.trim() || busy) return;
  busy = true;

  const userText = text.trim();
  addMsg('user', userText);
  history.push({ role: 'user', content: userText });
  userInput.value = '';

  // WhatsApp intent?
  const waResult = detectWhatsAppIntent(userText);
  if (waResult) { busy = false; handleWhatsApp(waResult); return; }

  // Tasker intent?
  const taskerResult = detectTaskerIntent(userText);
  if (taskerResult) { busy = false; handleTasker(taskerResult); return; }

  showTyping();

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, location: liveLocation })
    });
    const data = await res.json();
    removeTyping();

    const reply = data.reply || "I'm having trouble responding, Sir.";
    history.push({ role: 'assistant', content: reply });
    addMsg('ai', reply, data.searched ? 'live' : null);
    speak(reply);

  } catch (err) {
    removeTyping();
    const errMsg = "Connectivity issue, Sir. Please try again.";
    addMsg('ai', errMsg);
    speak(errMsg);
  }

  busy = false;
}

// ── TAP TO SPEAK ─────────────────────────────────────────────────
let tapRec = null;

function tapSpeak() {
  if (!SR) { addMsg('ai', 'Speech recognition not supported, Sir.'); return; }
  if (tapRec) { tapRec.stop(); return; }

  tapRec = new SR();
  tapRec.lang = 'en-US'; tapRec.interimResults = false; tapRec.continuous = false;

  tapRec.onstart = () => {
    tapBtn.classList.add('listening');
    tapIcon.textContent = '🔴'; tapLabel.textContent = 'LISTENING';
  };

  tapRec.onresult = (e) => {
    const t = e.results[0][0].transcript.trim();
    userInput.value = t;
    sendMessage(t);
  };

  tapRec.onend = tapRec.onerror = () => {
    tapRec = null;
    tapBtn.classList.remove('listening');
    tapIcon.textContent = '🎙️'; tapLabel.textContent = 'TAP TO SPEAK';
  };

  try { tapRec.start(); } catch(e) { tapRec = null; }
}

// ── MIC BUTTON ───────────────────────────────────────────────────
let micRec = null;

function toggleMic() {
  if (!SR) return;
  const btn = document.getElementById('micBtn');
  if (micRec) { micRec.stop(); return; }

  micRec = new SR();
  micRec.lang = 'en-US'; micRec.interimResults = true; micRec.continuous = false;

  micRec.onstart = () => btn.classList.add('recording');

  micRec.onresult = (e) => {
    let interim = '', final = '';
    for (const r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    userInput.value = final || interim;
  };

  micRec.onend = () => { micRec = null; btn.classList.remove('recording'); };
  micRec.onerror = () => { micRec = null; btn.classList.remove('recording'); };

  try { micRec.start(); } catch(e) { micRec = null; }
}

// ── LIVE MODE ─────────────────────────────────────────────────────
function startLiveMode() {
  if (!SR) { addMsg('ai', 'Speech recognition not supported, Sir.'); return; }
  liveMode = true;
  liveOverlay.classList.add('active');
  listenLoop();
}

function endLiveMode() {
  liveMode = false;
  if (liveRec) { try { liveRec.stop(); } catch(_){} liveRec = null; }
  speechSynthesis.cancel();
  liveOverlay.classList.remove('active');
  liveOrb.className = '';
  liveLabel.textContent = 'LISTENING';
  document.getElementById('liveMicDead').style.display = 'none';
}

function toggleMute() {
  liveMuted = !liveMuted;
  const btn = document.getElementById('muteBtn');
  btn.textContent = liveMuted ? '🔊' : '🔇';
  if (liveMuted) speechSynthesis.cancel();
}

function listenLoop() {
  if (!liveMode || busy) return;

  liveOrb.className = 'listening';
  liveLabel.textContent = 'LISTENING';
  liveText.textContent = '';
  document.getElementById('liveMicDead').style.display = 'none';

  liveRec = new SR();
  liveRec.lang = 'en-US'; liveRec.interimResults = true; liveRec.continuous = false;

  liveRec.onresult = (e) => {
    let interim = '', final = '';
    for (const r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    liveText.textContent = final || interim;
    if (final) {
      liveRec = null;
      liveOrb.className = 'thinking';
      liveLabel.textContent = 'THINKING';
      liveSend(final.trim());
    }
  };

  liveRec.onerror = (e) => {
    liveRec = null;
    if (liveMode) {
      if (e.error === 'no-speech') { setTimeout(listenLoop, 300); return; }
      document.getElementById('liveMicDead').style.display = 'block';
      liveOrb.className = '';
      liveLabel.textContent = 'MIC ERROR';
    }
  };

  liveRec.onend = () => {
    if (liveMode && liveRec) { liveRec = null; setTimeout(listenLoop, 300); }
  };

  try { liveRec.start(); } catch(e) { liveRec = null; if (liveMode) setTimeout(listenLoop, 1000); }
}

async function liveSend(text) {
  if (!text || busy) { if (liveMode) listenLoop(); return; }
  busy = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  // WhatsApp in live mode
  const waResult = detectWhatsAppIntent(text);
  if (waResult) {
    busy = false;
    handleWhatsApp(waResult);
    if (liveMode) setTimeout(listenLoop, 2000);
    return;
  }

  // Tasker in live mode
  const taskerResult = detectTaskerIntent(text);
  if (taskerResult) {
    busy = false;
    handleTasker(taskerResult);
    if (liveMode) setTimeout(listenLoop, 2000);
    return;
  }

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, location: liveLocation })
    });
    const data = await res.json();
    const reply = data.reply || "I'm having trouble, Sir.";
    history.push({ role: 'assistant', content: reply });
    addMsg('ai', reply, data.searched ? 'live' : null);
    liveText.textContent = reply;
    liveOrb.className = 'speaking';
    liveLabel.textContent = 'SPEAKING';
    speak(reply);
  } catch {
    const err = "Connectivity issue, Sir.";
    addMsg('ai', err); speak(err);
    liveText.textContent = err;
  }

  busy = false;
}
