<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050811;
            font-family: 'Rajdhani', sans-serif;
            color: #00f0ff;
            overflow: hidden;
        }

        /* Glitch & Hologram Overlay */
        .hologram-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 999;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Passcode Lock Screen */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a122c 0%, #030511 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #lock-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .lock-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .lock-subtitle {
            font-size: 1rem;
            color: #88a0c0;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .dots-container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border: 2px solid #00f0ff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .dot.active {
            background-color: #00f0ff;
            box-shadow: 0 0 15px #00f0ff, 0 0 30px #00f0ff;
        }

        .dot.error {
            border-color: #ff0055;
            background-color: #ff0055;
            box-shadow: 0 0 15px #ff0055, 0 0 30px #ff0055;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 20px;
            justify-content: center;
        }

        .key {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(0, 240, 255, 0.3);
            background: rgba(10, 25, 50, 0.5);
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .key:active {
            background: #00f0ff;
            color: #050811;
            box-shadow: 0 0 20px #00f0ff;
            transform: scale(0.95);
        }

        .key.clear {
            font-size: 1rem;
            border-color: rgba(255, 0, 85, 0.3);
            color: #ff0055;
        }
        .key.clear:active {
            background: #ff0055;
            color: #050811;
            box-shadow: 0 0 20px #ff0055;
        }

        /* Main Dashboard Layout */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 20px;
        }

        /* Top HUD Header */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            padding-bottom: 10px;
            font-family: 'Share Tech Mono', monospace;
        }

        .hud-left, .hud-right {
            display: flex;
            flex-direction: column;
        }

        .hud-right {
            align-items: flex-end;
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        .hud-status {
            font-size: 0.8rem;
            color: #55ffaa;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Main Display Panels */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 10;
        }

        /* Log / Terminal Output Screen */
        .terminal-display {
            width: 100%;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid rgba(0, 240, 255, 0.1);
            background: rgba(2, 6, 18, 0.7);
            border-radius: 4px;
            padding: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: #a0e0ff;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .terminal-line {
            margin-bottom: 4px;
            line-height: 1.2;
            word-break: break-word;
        }
        .terminal-line.user { color: #ffaa00; }
        .terminal-line.jarvis { color: #00ffaa; }
        .terminal-line.system { color: #88a0c0; font-style: italic; }

        /* Arc Reactor Core / Interactive Orb Layout */
        .orb-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        .jarvis-orb {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,240,255,0.2) 0%, rgba(0,40,80,0.6) 70%, rgba(5,8,17,1) 100%);
            border: 2px solid rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.3);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        /* Status Visual Rings */
        .orb-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px dashed rgba(0, 240, 255, 0.5);
            animation: rotateRing 12s linear infinite;
        }
        .ring-1 { width: 190px; height: 190px; animation-duration: 8s; }
        .ring-2 { width: 220px; height: 220px; animation-duration: 15s; animation-direction: reverse; border-style: dotted; border-width: 2px;}

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Voice Bar Container Overlaid on Orb */
        .voice-bars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 60px;
            position: absolute;
            width: 100%;
            pointer-events: none;
        }

        .bar {
            width: 4px;
            height: 8px;
            background-color: #00f0ff;
            border-radius: 2px;
            transition: height 0.1s ease, background-color 0.3s ease;
            box-shadow: 0 0 5px #00f0ff;
        }

        /* Dynamic System Operational Statuses */
        .jarvis-orb.listening {
            border-color: #ffaa00;
            box-shadow: 0 0 40px rgba(255, 170, 0, 0.5), inset 0 0 20px rgba(255, 170, 0, 0.3);
        }
        .jarvis-orb.listening .bar {
            background-color: #ffaa00;
            box-shadow: 0 0 5px #ffaa00;
        }

        .jarvis-orb.thinking {
            border-color: #cc00ff;
            box-shadow: 0 0 40px rgba(204, 0, 255, 0.5), inset 0 0 20px rgba(204, 0, 255, 0.3);
            animation: pulseThinking 1s infinite alternate;
        }
        .jarvis-orb.thinking .bar {
            background-color: #cc00ff;
            box-shadow: 0 0 5px #cc00ff;
        }

        .jarvis-orb.speaking {
            border-color: #00ffaa;
            box-shadow: 0 0 45px rgba(0, 255, 170, 0.6), inset 0 0 25px rgba(0, 255, 170, 0.4);
        }
        .jarvis-orb.speaking .bar {
            background-color: #00ffaa;
            box-shadow: 0 0 5px #00ffaa;
        }

        @keyframes pulseThinking {
            from { transform: scale(1); opacity: 0.9; }
            to { transform: scale(1.05); opacity: 1; }
        }

        /* Central Display Typography */
        .status-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-align: center;
            text-transform: uppercase;
            margin-top: 15px;
            min-height: 24px;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.4);
        }

        /* Master Console Toolbar Adjustments */
        .control-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .mode-container {
            display: flex;
            width: 100%;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            background: rgba(6, 18, 36, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 4px;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn:active, .btn.active {
            background: rgba(0, 240, 255, 0.2);
            border-color: #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            text-shadow: 0 0 5px #00f0ff;
        }

        .btn.btn-voice-loop {
            background: rgba(0, 40, 80, 0.4);
            border-color: rgba(0, 240, 255, 0.5);
        }
        .btn.btn-voice-loop.active {
            background: rgba(0, 240, 255, 0.25);
            border-color: #00f0ff;
            animation: neonGlow 2s infinite alternate;
        }

        .btn.btn-mute {
            flex: 0 0 60px;
            border-color: rgba(255, 0, 85, 0.3);
            color: #ff0055;
        }
        .btn.btn-mute.active {
            background: rgba(255, 0, 85, 0.2);
            border-color: #ff0055;
            color: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        @keyframes neonGlow {
            from { box-shadow: 0 0 10px rgba(0,240,255,0.3); }
            to { box-shadow: 0 0 20px rgba(0,240,255,0.6); }
        }

        /* Text Input Fallback Module Layout */
        .text-input-row {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        .text-field {
            flex: 1;
            background: rgba(2, 6, 18, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 4px;
            padding: 12px;
            color: #00f0ff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s;
        }
        .text-field:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .btn-send {
            padding: 0 20px;
            background: #00f0ff;
            color: #050811;
            border: none;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-send:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px #00f0ff;
        }
    </style>
</head>
<body>

    <div class="hologram-grid"></div>

    <!-- Security Authentication Matrix Gateway -->
    <div id="lock-screen">
        <div class="lock-title">JARVIS Mainframe</div>
        <div class="lock-subtitle">Biometric Bypass Offline. Provide Passcode.</div>
        
        <div class="dots-container" id="dots-container">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="keypad" id="keypad">
            <div class="key" data-val="1">1</div>
            <div class="key" data-val="2">2</div>
            <div class="key" data-val="3">3</div>
            <div class="key" data-val="4">4</div>
            <div class="key" data-val="5">5</div>
            <div class="key" data-val="6">6</div>
            <div class="key" data-val="7">7</div>
            <div class="key" data-val="8">8</div>
            <div class="key" data-val="9">9</div>
            <div class="key clear" data-val="clear">CLR</div>
            <div class="key" data-val="0">0</div>
            <div class="key" style="visibility: hidden;"></div>
        </div>
    </div>

    <!-- Core Interactive UI Application Container -->
    <div class="app-container">
        <header>
            <div class="hud-left">
                <span class="hud-title">J.A.R.V.I.S. v3.3</span>
                <span class="hud-status" id="sys-status">System: Secure</span>
            </div>
            <div class="hud-right">
                <span id="hud-date" style="color: #88a0c0; font-size: 0.85rem;">00.00.0000</span>
                <span id="hud-time" style="letter-spacing: 1px; font-weight: 700; margin-top: 2px;">00:00:00</span>
            </div>
        </header>

        <div class="main-panel">
            <!-- Terminal Output System Logs -->
            <div class="terminal-display" id="terminal">
                <div class="terminal-line system">Initialization complete. Core operational.</div>
                <div class="terminal-line jarvis">JARVIS: Awaiting verification sequence, Boss Muhammed Aali.</div>
            </div>

            <!-- Central Core Orb & Arc Visualizations -->
            <div class="orb-wrapper">
                <div class="orb-ring ring-1"></div>
                <div class="orb-ring ring-2"></div>
                <div id="reactor-core" class="jarvis-orb">
                    <div class="voice-bars" id="voice-bars">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
            </div>

            <!-- Current Textual Directive Display -->
            <div class="status-text" id="status-display">STANDBY</div>

            <!-- Master System Control Hardware Interfaces -->
            <div class="control-panel">
                <div class="mode-container">
                    <button class="btn btn-voice-loop" id="btn-live-voice">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="margin-right:4px;">
                            <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/>
                            <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/>
                        </svg>
                        Live Voice Loop
                    </button>
                    <button class="btn btn-mute" id="btn-mute-toggle" title="Toggle Mute Output">
                        🔊
                    </button>
                </div>

                <div class="text-input-row">
                    <input type="text" class="text-field" id="text-input" placeholder="Type systemic request matrix..." autocomplete="off">
                    <button class="btn-send" id="btn-submit">EXEC</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // System Identity Settings
        const USER_NAME = "Boss Muhammed Aali";
        const PASSCODE_TARGET = "615113";
        const SYSTEM_PROMPT = `You are JARVIS, an advanced, ultra-intelligent AI persona matching Iron Man's home assistant. You possess elite technical, geopolitical, and scientific knowledge. You always call the user "${USER_NAME}" at the beginning of the conversation or dynamically when appropriate, and routinely address him as "Sir" within your responses. Your style is sleek, polite, confident, concise, and incredibly responsive. Avoid lengthy pleasantries; stay sharp and ready to execute.`;

        // Runtime State State Management
        let currentInputPasscode = "";
        let isMuted = false;
        let isLiveVoiceActive = false;
        let conversationHistory = [];
        
        // Audio Interfaces and Recognition Instances
        let recognition = null;
        let currentTtsUtterance = null;
        let animationInterval = null;
        let globalTtsVoice = null;

        // DOM Element Cache Map
        const domElements = {
            lockScreen: document.getElementById('lock-screen'),
            dots: document.querySelectorAll('.dot'),
            keypad: document.getElementById('keypad'),
            terminal: document.getElementById('terminal'),
            reactorCore: document.getElementById('reactor-core'),
            statusDisplay: document.getElementById('status-display'),
            btnLiveVoice: document.getElementById('btn-live-voice'),
            btnMuteToggle: document.getElementById('btn-mute-toggle'),
            textInput: document.getElementById('text-input'),
            btnSubmit: document.getElementById('btn-submit'),
            sysStatus: document.getElementById('sys-status'),
            hudDate: document.getElementById('hud-date'),
            hudTime: document.getElementById('hud-time'),
            voiceBars: document.querySelectorAll('.bar')
        };

        // --- Core Verification Security Sequence (Passcode) ---
                domElements.keypad.addEventListener('click', (e) => {
            const target = e.target;
            if (!target.classList.contains('key')) return;

            const val = target.getAttribute('data-val');

            if (val === 'clear') {
                resetPasscodeField();
                return;
            }

            if (val && currentInputPasscode.length < 6) {
                currentInputPasscode += val;
                updatePasscodeDots();

                if (currentInputPasscode.length === 6) {
                    verifyPasscodeSequence();
                }
            }
        });

        function updatePasscodeDots() {
            domElements.dots.forEach((dot, index) => {
                if (index < currentInputPasscode.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function resetPasscodeField() {
            currentInputPasscode = "";
            domElements.dots.forEach(dot => {
                dot.classList.remove('active', 'error');
            });
        }

        function verifyPasscodeSequence() {
            if (currentInputPasscode === PASSCODE_TARGET) {
                logTerminalLine("System Security Handshake: SUCCESS.", "system");
                domElements.lockScreen.classList.add('hidden');
                speakPhrase(`Welcome back, ${USER_NAME}. All systems are fully operational.`);
                initializeWebSpeechEngines();
            } else {
                logTerminalLine("System Security Handshake: FAILURE. Access Denied.", "system");
                domElements.dots.forEach(dot => dot.classList.add('error'));
                navigator.vibrate?.([100, 50, 100]);
                setTimeout(resetPasscodeField, 1000);
            }
        }

        // --- Real-Time HUD Updates ---
        function runHudChronograph() {
            const now = new Date();
            
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            domElements.hudDate.textContent = `${day}.${month}.${year}`;

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            domElements.hudTime.textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(runHudChronograph, 1000);
        runHudChronograph();

        // --- Terminal Interactivity Logger ---
        function logTerminalLine(text, type = "system") {
            const line = document.createElement('div');
            line.classList.add('terminal-line', type);
            
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            line.textContent = `[${timestamp}] ${type === 'user' ? 'YOU' : type.toUpperCase()}: ${text}`;
            
            domElements.terminal.appendChild(line);
            domElements.terminal.scrollTop = domElements.terminal.scrollHeight;
        }

        // --- Visual Interface State Transitions ---
        function setCoreInterfaceState(state) {
            domElements.reactorCore.classList.remove('listening', 'thinking', 'speaking');
            clearInterval(animationInterval);
            resetVoiceBars();

            domElements.statusDisplay.textContent = state;

            if (state === 'LISTENING') {
                domElements.reactorCore.classList.add('listening');
                animateVoiceBars(20, 70, 80);
            } else if (state === 'THINKING') {
                domElements.reactorCore.classList.add('thinking');
                animateVoiceBars(10, 30, 120);
            } else if (state === 'SPEAKING') {
                domElements.reactorCore.classList.add('speaking');
                animateVoiceBars(30, 95, 60);
            } else {
                domElements.statusDisplay.textContent = "STANDBY";
            }
        }

        function animateVoiceBars(minHeight, maxHeight, rate) {
            animationInterval = setInterval(() => {
                domElements.voiceBars.forEach(bar => {
                    const randomHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                    bar.style.height = `${randomHeight}%`;
                });
            }, rate);
        }

        function resetVoiceBars() {
            domElements.voiceBars.forEach(bar => bar.style.height = '8
