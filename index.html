<!-- ─────────────────────────────────────────────────────
  SECTION 3 — JavaScript (add inside your <script> tag
  or as a new <script> block before </body>)
───────────────────────────────────────────────────────── -->
<script>
/*
  ╔══════════════════════════════════════════════════════╗
  ║  JARVIS PHONE ACCESS MODULE                          ║
  ║  1. Location   2. Camera + Vision   3. Contacts      ║
  ║  4. Dialer     5. Voice command router               ║
  ╚══════════════════════════════════════════════════════╝
*/

// ════════════════════════════════════════════════════════
// 1. LOCATION
// ════════════════════════════════════════════════════════

let jarvisLocation = null;  // { lat, lng, city, country }

async function getLocation(announce = true) {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      if (announce) speak('Geolocation is not supported on this device, Sir.');
      resolve(null); return;
    }

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude: lat, longitude: lng } = pos.coords;
        jarvisLocation = { lat, lng };

        // Reverse geocode using free API
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
          );
          const data = await res.json();
          const city    = data.address?.city || data.address?.town || data.address?.village || 'Unknown city';
          const country = data.address?.country || '';
          jarvisLocation = { lat, lng, city, country };

          const badge = document.getElementById('jarvis-location-badge');
          const text  = document.getElementById('jarvis-location-text');
          if (badge && text) {
            text.textContent = `${city}, ${country}`;
            badge.style.display = 'block';
            setTimeout(() => badge.style.display = 'none', 6000);
          }

          if (announce) {
            speak(`Your current location is ${city}, ${country}, Sir.`);
            addMsg('assistant', `📍 Location: ${city}, ${country}`);
          }
        } catch {
          if (announce) speak(`I found your coordinates, Sir. Latitude ${lat.toFixed(3)}, Longitude ${lng.toFixed(3)}.`);
        }

        resolve(jarvisLocation);
      },
      (err) => {
        const msgs = {
          1: 'Location permission was denied, Sir. Please allow it in your browser settings.',
          2: 'Could not determine your location, Sir. GPS signal may be weak.',
          3: 'Location request timed out, Sir.'
        };
        if (announce) speak(msgs[err.code] || 'Location unavailable, Sir.');
        resolve(null);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  });
}

function trackLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    async (pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;
      if (jarvisLocation) {
        jarvisLocation.lat = lat;
        jarvisLocation.lng = lng;
      }
    },
    null,
    { enableHighAccuracy: true, maximumAge: 30000 }
  );
}


// ════════════════════════════════════════════════════════
// 2. CAMERA + VISION ANALYSIS
// ════════════════════════════════════════════════════════

let cameraStream = null;
let cameraFacing = 'environment';  // 'environment' = back, 'user' = front
let capturedImageBase64 = null;

async function openCamera() {
  const overlay = document.getElementById('jarvis-camera');
  const video   = document.getElementById('jarvis-video');

  if (!navigator.mediaDevices?.getUserMedia) {
    speak('Camera is not supported on this browser, Sir.');
    return;
  }

  try {
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
    }

    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: cameraFacing, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });

    video.srcObject = cameraStream;
    overlay.classList.add('active');
    speak('Camera ready, Sir. Tap capture when ready.');
  } catch (err) {
    speak('Could not access camera, Sir. Please check permissions.');
    console.warn('Camera error:', err);
  }
}

function closeCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  document.getElementById('jarvis-camera').classList.remove('active');
}

function switchCamera() {
  cameraFacing = cameraFacing === 'environment' ? 'user' : 'environment';
  openCamera();
}

function capturePhoto() {
  const video  = document.getElementById('jarvis-video');
  const canvas = document.getElementById('jarvis-canvas');
  const img    = document.getElementById('jarvis-captured-img');
  const preview = document.getElementById('jarvis-photo-preview');

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  capturedImageBase64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
  img.src = canvas.toDataURL('image/jpeg', 0.85);

  closeCamera();
  preview.classList.add('active');
  document.getElementById('jarvis-photo-analysis').textContent = 'Analyzing image, Sir…';

  analyzePhoto();
}

async function analyzePhoto() {
  if (!capturedImageBase64) return;

  document.getElementById('jarvis-photo-analysis').textContent = 'Analyzing, Sir…';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: capturedImageBase64 }
            },
            {
              type: 'text',
              text: 'You are JARVIS, an AI assistant. Describe what you see in this image concisely in 2-3 sentences. Be helpful and specific. Address the user as "Sir".'
            }
          ]
        }]
      })
    });

    const data = await res.json();
    const analysis = data.content?.[0]?.text || 'I could not analyze the image, Sir.';
    document.getElementById('jarvis-photo-analysis').textContent = analysis;
    speak(analysis);
    addMsg('assistant', `📸 ${analysis}`);
  } catch (err) {
    const fallback = 'Image captured, Sir. Vision analysis unavailable right now.';
    document.getElementById('jarvis-photo-analysis').textContent = fallback;
    speak(fallback);
  }
}

function closePhotoPreview() {
  document.getElementById('jarvis-photo-preview').classList.remove('active');
  capturedImageBase64 = null;
}


// ════════════════════════════════════════════════════════
// 3. CONTACTS
// ════════════════════════════════════════════════════════

async function openContacts() {
  // Contact Picker API — supported in Chrome Android 80+
  if (!('contacts' in navigator && 'ContactsManager' in window)) {
    speak('Contact picker is not supported on this browser, Sir. Try Chrome on Android.');
    return;
  }

  try {
    const contacts = await navigator.contacts.select(
      ['name', 'tel', 'email'],
      { multiple: false }
    );

    if (!contacts || contacts.length === 0) {
      speak('No contact selected, Sir.');
      return;
    }

    const contact = contacts[0];
    const name  = contact.name?.[0]  || 'Unknown';
    const phone = contact.tel?.[0]   || null;
    const email = contact.email?.[0] || null;

    let info = `Contact selected: ${name}`;
    if (phone) info += `, number ${phone}`;
    if (email) info += `, email ${email}`;

    speak(`${name} selected, Sir.${phone ? ` Number is ${phone}.` : ''} Would you like me to call?`);
    addMsg('assistant', `👤 ${info}`);

    // Store for potential follow-up "call them" command
    window._lastContact = { name, phone, email };

  } catch (err) {
    if (err.name !== 'AbortError') {
      speak('Could not access contacts, Sir.');
      console.warn('Contacts error:', err);
    }
  }
}


// ════════════════════════════════════════════════════════
// 4. DIALER
// ════════════════════════════════════════════════════════

function callNumber(number) {
  if (!number) {
    speak('No number provided, Sir.');
    return;
  }
  // Clean number
  const clean = number.replace(/[^\d+]/g, '');
  speak(`Calling ${number}, Sir.`);
  addMsg('assistant', `📞 Calling ${number}…`);
  setTimeout(() => { window.location.href = `tel:${clean}`; }, 1200);
}

function callLastContact() {
  if (!window._lastContact?.phone) {
    speak('No recent contact to call, Sir. Please select one first.');
    return;
  }
  callNumber(window._lastContact.phone);
}


// ════════════════════════════════════════════════════════
// 5. VOICE COMMAND ROUTER
// ════════════════════════════════════════════════════════
/*
  Call processPhoneCommand(transcript) from your existing
  speech recognition onresult handler BEFORE sending to
  the Groq API. If it returns true, the command was handled
  locally and you should skip the API call.
*/

async function processPhoneCommand(text) {
  const t = text.toLowerCase().trim();

  // ── Location ──
  if (/(where am i|my location|current location|where are we)/.test(t)) {
    await getLocation(true);
    return true;
  }

  // ── Camera ──
  if (/(open camera|take photo|take a photo|take picture|capture|show camera)/.test(t)) {
    await openCamera();
    return true;
  }

  if (/(close camera|stop camera)/.test(t)) {
    closeCamera();
    return true;
  }

  if (/(analyze|what do you see|describe this|what is this)/.test(t) && capturedImageBase64) {
    analyzePhoto();
    return true;
  }

  // ── Contacts ──
  if (/(open contacts|find contact|search contact|pick contact|select contact)/.test(t)) {
    await openContacts();
    return true;
  }

  // ── Dialer ──
  if (/(call them|call him|call her|call the contact|dial them)/.test(t)) {
    callLastContact();
    return true;
  }

  // "call 03001234567" or "call Ahmed on 0300..."
  const callMatch = t.match(/call\s+(?:.*?\s+on\s+)?([\d\s\+\-]{7,})/);
  if (callMatch) {
    callNumber(callMatch[1].trim());
    return true;
  }

  return false;  // not a phone command, send to Groq as normal
}

// ════════════════════════════════════════════════════════
// 6. AUTO-INIT
// ════════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', () => {
  // Start passive location tracking silently
  trackLocation();
});

// Expose all functions globally
window.getLocation       = getLocation;
window.openCamera        = openCamera;
window.closeCamera       = closeCamera;
window.switchCamera      = switchCamera;
window.capturePhoto      = capturePhoto;
window.analyzePhoto      = analyzePhoto;
window.closePhotoPreview = closePhotoPreview;
window.openContacts      = openContacts;
window.callNumber        = callNumber;
window.callLastContact   = callLastContact;
window.processPhoneCommand = processPhoneCommand;

</script>


<!--
══════════════════════════════════════════════════════════
  HOW TO WIRE INTO YOUR EXISTING SPEECH RECOGNITION
══════════════════════════════════════════════════════════

In your existing liveRec.onresult (or regular mic onresult),
find where you call sendToJarvis(transcript) and wrap it:

  BEFORE:
    sendToJarvis(transcript);

  AFTER:
    const handled = await processPhoneCommand(transcript);
    if (!handled) sendToJarvis(transcript);

That's it. JARVIS will intercept phone commands locally
and only hit the Groq API for everything else.

══════════════════════════════════════════════════════════
  VOICE COMMANDS JARVIS NOW UNDERSTANDS
══════════════════════════════════════════════════════════

  "Where am I"              → GPS location + city name
  "My location"             → same
  "Open camera"             → opens rear camera
  "Take a photo"            → opens camera
  "Flip camera"             → switches front/rear
  "Capture"                 → takes photo + analyzes it
  "What do you see"         → re-analyzes last photo
  "Open contacts"           → opens contact picker
  "Find a contact"          → same
  "Call them"               → calls last selected contact
  "Call 03001234567"        → opens dialer with that number

══════════════════════════════════════════════════════════
  NOTE ON CAMERA VISION ANALYSIS
══════════════════════════════════════════════════════════

  The photo analysis uses the Anthropic Claude API directly
  from the browser. This means the API key is exposed in
  the frontend — fine for personal use, but if you make
  JARVIS public, route the vision call through your
  api/chat.js backend instead.

══════════════════════════════════════════════════════════
-->
