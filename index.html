<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

  <title>JARVIS</title>

  <!-- 🌐 FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:#020a14;
      --border:#0a2040;
      --accent:#00d4ff;
      --accent2:#0066cc;
      --text:#c8e8ff;
      --dim:#4a7a9b;
      --glow:0 0 20px rgba(0,212,255,0.3);
    }

    * {
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body {
      background:var(--bg);
      color:var(--text);
      font-family:'Orbitron','Rajdhani',sans-serif;
      height:100dvh;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* HEADER */
    #header {
      display:flex;
      justify-content:space-between;
      padding:12px;
      border-bottom:1px solid var(--border);
      align-items:center;
    }

    .header-logo {
      font-family:'Orbitron',sans-serif;
      letter-spacing:4px;
      color:var(--accent);
      text-shadow:var(--glow);
    }

    /* CHAT */
    #chat {
      flex:1;
      overflow:auto;
      padding:12px;
    }

    .msg {
      margin:8px 0;
      font-size:14px;
    }

    .user {
      text-align:right;
      color:white;
    }

    .ai {
      color:var(--accent);
    }

    /* INPUT */
    #inputBar {
      display:flex;
      border-top:1px solid var(--border);
      align-items:center;
      padding:8px;
      gap:8px;
    }

    #userInput {
      flex:1;
      padding:12px;
      border-radius:20px;
      border:1px solid var(--border);
      background:#050f1e;
      color:white;
      outline:none;
      font-family:'Rajdhani',sans-serif;
      transition:0.2s;
    }

    #userInput:focus {
      border-color:var(--accent);
      box-shadow:0 0 15px rgba(0,212,255,0.25);
    }

    .icon-btn {
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid var(--border);
      background:rgba(0,212,255,0.08);
      color:var(--accent);
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.2s;
      font-size:16px;
    }

    .icon-btn:hover {
      box-shadow:var(--glow);
    }

    .recording {
      border-color:red !important;
      color:red !important;
      box-shadow:0 0 15px rgba(255,0,0,0.3);
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div id="header">
  <div class="header-logo">J.A.R.V.I.S</div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="inputBar">
  <input id="userInput" type="text" placeholder="Ask JARVIS..."
    onkeydown="if(event.key==='Enter') sendMessage(this.value)"/>

  <div class="icon-btn" id="micBtn" onclick="toggleMic()">🎤</div>

  <div class="icon-btn" onclick="sendMessage(document.getElementById('userInput').value)">➤</div>
</div>

<script>
/* ───────── CHAT FUNCTION ───────── */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

/* ───────── SEND MESSAGE ───────── */
async function sendMessage(text) {
  if (!text) return;

  addMsg(text, "user");
  document.getElementById("userInput").value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await res.json();
  addMsg(data.reply, "ai");
}

/* ───────── VOICE SYSTEM ───────── */
let recognition;
let listening = false;

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert("Voice not supported");
    return;
  }

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onstart = () => {
    listening = true;
    document.getElementById("micBtn").classList.add("recording");
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById("userInput").value = text;
    sendMessage(text);
  };

  recognition.onerror = stopVoice;
  recognition.onend = stopVoice;

  recognition.start();
}

function stopVoice() {
  listening = false;
  document.getElementById("micBtn").classList.remove("recording");
}

function toggleMic() {
  if (listening) {
    recognition.stop();
  } else {
    startVoice();
  }
}
</script>

</body>
</html>
