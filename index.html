<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="JARVIS"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#020a14"/>
  <title>JARVIS</title>
  <link rel="manifest" href="manifest.json"/>

  <style>
    :root {
      --bg:#020a14;
      --surface:#050f1e;
      --border:#0a2040;
      --accent:#00d4ff;
      --accent2:#0066cc;
      --danger:#ff3333;
      --text:#c8e8ff;
      --dim:#4a7a9b;
      --glow:0 0 20px rgba(0,212,255,0.3);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:monospace;
      height:100dvh;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* BOOT */
    #boot{
      position:fixed;inset:0;
      background:var(--bg);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #bootLog{
      font-size:11px;
      color:var(--dim);
      height:120px;
      overflow:hidden;
    }

    /* HEADER */
    #header{
      display:flex;
      justify-content:space-between;
      padding:12px;
      border-bottom:1px solid var(--border);
    }

    #locationBadge{display:none;font-size:10px;color:var(--dim)}

    /* CHAT */
    #chat{
      flex:1;
      overflow:auto;
      padding:10px;
    }

    .msg{margin:8px 0}
    .user{text-align:right;color:#fff}
    .ai{color:var(--accent)}

    /* INPUT */
    #inputBar{
      display:flex;
      border-top:1px solid var(--border);
    }

    input{
      flex:1;
      padding:12px;
      background:#050f1e;
      border:none;
      color:white;
    }

    button{
      background:var(--accent);
      border:none;
      padding:12px;
    }
  </style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div style="font-size:16px;letter-spacing:4px;margin-bottom:10px">
    JARVIS: ROOT INITIALIZING
  </div>
  <div id="bootLog"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex:1;flex-direction:column">

  <div id="header">
    <div>JARVIS CORE</div>
    <div id="locationBadge">📍 <span id="locationCity"></span></div>
  </div>

  <div id="chat"></div>

  <div id="inputBar">
    <input id="input" placeholder="Ask JARVIS..."/>
    <button onclick="send()">➤</button>
  </div>

</div>

<script>
/* ───────── ROOT BOOT SYSTEM ───────── */
const bootLog = document.getElementById("bootLog");

function log(msg, t=400){
  return new Promise(res=>{
    setTimeout(()=>{
      bootLog.innerHTML += msg+"<br>";
      res();
    },t);
  });
}

async function boot(){
  await log("→ Loading kernel...");
  await log("→ Syncing timezone...");
  await log("→ Starting location module...");
  await log("→ Activating AI brain...");
  await log("SYSTEM ONLINE");

  setTimeout(()=>{
    document.getElementById("boot").style.display="none";
    document.getElementById("app").style.display="flex";
  },800);
}

/* ───────── LOCATION (FIX 2 APPLIED) ───────── */
let jarvisLocation = null;

function initLocation() {

  jarvisLocation = {
    lat:null,
    lon:null,
    city:'',
    timezone:Intl.DateTimeFormat().resolvedOptions().timeZone
  };

  if (!navigator.geolocation) return;

  navigator.geolocation.getCurrentPosition(async (pos)=>{

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    let city = '';

    try{
      const r = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
      );
      const d = await r.json();
      city = d.address?.city || d.address?.town || d.address?.village || '';
    }catch(e){}

    jarvisLocation = {
      lat,
      lon,
      city,
      timezone:Intl.DateTimeFormat().resolvedOptions().timeZone
    };

    if(city){
      document.getElementById("locationCity").textContent = city.toUpperCase();
      document.getElementById("locationBadge").style.display = "block";
    }

  },()=>{},{timeout:8000});
}

/* ───────── CHAT ───────── */
async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  add(text,"user");
  input.value="";

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      messages:[{role:"user",content:text}],
      location:jarvisLocation
    })
  });

  const data = await res.json();
  add(data.reply,"ai");
}

function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
}

/* ───────── START SYSTEM ───────── */
boot();
initLocation();
</script>

</body>
</html>
