<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>JARVIS CORE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#020a14;
  --accent:#00d4ff;
  --accent2:#0066ff;
  --text:#c8e8ff;
  --dim:#4a7a9b;
  --glow:0 0 25px rgba(0,212,255,0.4);

  --font-ai:'Orbitron',sans-serif;
  --font-body:'Rajdhani',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:radial-gradient(circle,#071424,#020a14);
  color:var(--text);
  font-family:var(--font-body);
  height:100vh;
  overflow:hidden;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px 14px;
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--dim);
  border-bottom:1px solid rgba(0,212,255,0.2);
}

/* MAIN */
.hud{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* CENTER HOLOGRAM */
.center{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* ORB */
.orb{
  width:170px;
  height:170px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(0,212,255,0.5),transparent 60%);
  border:2px solid var(--accent);
  box-shadow:0 0 60px rgba(0,212,255,0.3);
  animation:float 3s ease-in-out infinite;
  position:relative;
}

/* RINGS */
.orb::before,
.orb::after{
  content:"";
  position:absolute;
  inset:-50px;
  border-radius:50%;
  border:1px solid rgba(0,212,255,0.2);
  animation:spin 8s linear infinite;
}

.orb::after{
  inset:-90px;
  border:1px solid rgba(0,212,255,0.1);
  animation-duration:12s;
}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* SCAN LINE */
.scan{
  position:absolute;
  width:100%;
  height:2px;
  background:rgba(0,212,255,0.3);
  animation:scan 3s linear infinite;
}

@keyframes scan{
  0%{top:0;opacity:0}
  50%{opacity:1}
  100%{top:100%;opacity:0}
}

/* CHAT */
.chat{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  max-height:180px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg{
  padding:8px 10px;
  border-radius:10px;
  font-size:13px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,212,255,0.2);
}

.user{align-self:flex-end;background:rgba(0,102,255,0.25);}
.ai{align-self:flex-start;background:rgba(0,212,255,0.08);}

/* INPUT */
.inputBar{
  display:flex;
  gap:8px;
  padding:10px;
  border-top:1px solid rgba(0,212,255,0.2);
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid rgba(0,212,255,0.2);
  background:rgba(0,0,0,0.4);
  color:white;
  outline:none;
  font-family:var(--font-body);
}

button{
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid rgba(0,212,255,0.3);
  background:rgba(0,212,255,0.1);
  color:var(--accent);
  cursor:pointer;
}

/* LISTENING MODE */
.listening .orb{
  border-color:red;
  box-shadow:0 0 80px rgba(255,0,0,0.4);
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}
</style>
</head>

<body>

<div class="hud">

  <div class="topbar">
    <div>JARVIS CORE ACTIVE</div>
    <div id="status">ONLINE</div>
  </div>

  <div class="center">
    <div class="scan"></div>
    <div class="orb"></div>
    <div class="chat" id="chat"></div>
  </div>

  <div class="inputBar">
    <input id="input" placeholder="Ask JARVIS..."/>
    <button onclick="send()">➤</button>
    <button onclick="mic()">🎤</button>
  </div>

</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* CHAT */
function addMsg(text,type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* SEND (FIXED + SAFE) */
async function send(){
  const text=input.value.trim();
  if(!text)return;

  addMsg(text,"user");
  input.value="";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        messages:[{role:"user",content:text}]
      })
    });

    const data=await res.json();

    const reply =
      data.reply || data.message || data.content || "No response";

    addMsg(reply,"ai");

  }catch(e){
    addMsg("SYSTEM OFFLINE","ai");
  }
}

/* VOICE */
let rec;
let listening=false;

function mic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return alert("No voice support");

  if(listening && rec){
    rec.stop();
    return;
  }

  rec=new SR();
  rec.lang="en-US";

  listening=true;
  document.body.classList.add("listening");

  rec.onresult=(e)=>{
    const text=e.results[0][0].transcript;
    input.value=text;
    send();
  };

  rec.onerror=stop;
  rec.onend=stop;

  rec.start();
}

function stop(){
  listening=false;
  document.body.classList.remove("listening");
}

</script>

</body>
</html>
