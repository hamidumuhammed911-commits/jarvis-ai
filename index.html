<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#020a14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JARVIS" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>JARVIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020a14;
      --accent: #00d4ff;
      --accent3: #ff6b00;
      --green: #00ff88;
      --text: #c8e8ff;
      --text-dim: #4a7a99;
      --glow: 0 0 20px rgba(0,212,255,0.4);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
    header { z-index:10; padding:14px 20px; border-bottom:1px solid rgba(0,212,255,0.15); background:rgba(2,10,20,0.98); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-ring { width:34px; height:34px; border-radius:50%; border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; box-shadow:var(--glow); animation:spin-ring 8s linear infinite; }
    .logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:var(--glow); animation:pulse-dot 2s ease-in-out infinite; }
    @keyframes spin-ring { to { transform:rotate(360deg); } }
    @keyframes pulse-dot { 50% { opacity:0.5; transform:scale(0.8); } }
    .logo-text { font-family:'Orbitron',monospace; font-weight:900; font-size:20px; letter-spacing:4px; color:var(--accent); text-shadow:var(--glow); }
    .status-badge { font-size:10px; color:var(--accent); border:1px solid rgba(0,212,255,0.4); padding:4px 10px; border-radius:20px; letter-spacing:1px; }
    #messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; z-index:1; scroll-behavior:smooth; }
    #messages::-webkit-scrollbar { width:3px; }
    #messages::-webkit-scrollbar-thumb { background:rgba(0,212,255,0.3); }
    .msg { max-width:88%; animation:msg-in 0.3s ease-out; }
    @keyframes msg-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg.user { align-self:flex-end; }
    .msg.ai { align-self:flex-start; }
    .msg-label { font-size:9px; letter-spacing:2px; margin-bottom:4px; opacity:0.5; }
    .msg.user .msg-label { text-align:right; color:var(--accent3); }
    .msg.ai .msg-label { color:var(--accent); }
    .msg-bubble { padding:12px 16px; line-height:1.6; font-size:14px; }
    .msg.user .msg-bubble { background:rgba(255,107,0,0.1); border:1px solid rgba(255,107,0,0.3); border-right:3px solid var(--accent3); color:#ffd4a8; border-radius:2px; }
    .msg.ai .msg-bubble { background:rgba(0,212,255,0.05); border:1px solid rgba(0,212,255,0.2); border-left:3px solid var(--accent); color:var(--text); border-radius:2px; }
    .thinking { display:flex; gap:6px; align-items:center; padding:14px 16px; }
    .thinking span { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:think 1.2s ease-in-out infinite; }
    .thinking span:nth-child(2) { animation-delay:0.2s; }
    .thinking span:nth-child(3) { animation-delay:0.4s; }
    @keyframes think { 0%,100% { opacity:0.2; transform:scale(0.8); } 50% { opacity:1; transform:scale(1.3); box-shadow:0 0 8px var(--accent); } }
    .welcome { text-align:center; padding:50px 20px; }
    .welcome-title { font-family:'Orbitron',monospace; font-weight:900; font-size:26px; letter-spacing:6px; color:var(--accent); text-shadow:var(--glow); margin-bottom:8px; }
    .welcome-sub { font-size:11px; letter-spacing:2px; color:var(--text-dim); }
    .welcome-line { width:80px; height:1px; margin:16px auto; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
    .welcome-hint { font-size:12px; color:var(--text-dim); letter-spacing:1px; margin-top:30px; opacity:0.7; }
    footer { z-index:10; flex-shrink:0; border-top:1px solid rgba(0,212,255,0.15); background:rgba(2,10,20,0.98); padding:12px 12px 24px; }
    #tapBtn { width:100%; padding:18px; background:rgba(0,212,255,0.08); border:2px solid var(--accent); border-radius:6px; color:var(--accent); font-family:'Orbitron',monospace; font-size:15px; letter-spacing:3px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px; box-shadow:0 0 20px rgba(0,212,255,0.15); transition:all 0.15s; touch-action:manipulation; user-select:none; margin-bottom:10px; }
    #tapBtn:active, #tapBtn.active { background:rgba(0,212,255,0.2); box-shadow:0 0 40px rgba(0,212,255,0.4); transform:scale(0.98); }
    #tapBtn.listening { border-color:var(--accent3); color:var(--accent3); background:rgba(255,107,0,0.1); animation:tap-pulse 1s ease-in-out infinite; }
    #tapBtn.speaking { border-color:var(--green); color:var(--green); background:rgba(0,255,136,0.08); }
    @keyframes tap-pulse { 0%,100% { box-shadow:0 0 20px rgba(255,107,0,0.3); } 50% { box-shadow:0 0 40px rgba(255,107,0,0.7); } }
    .text-row { display:flex; gap:8px; align-items:center; }
    #userInput { flex:1; background:rgba(0,212,255,0.04); border:1px solid rgba(0,212,255,0.25); border-radius:4px; color:var(--text); font-family:'Share Tech Mono',monospace; font-size:15px; padding:14px; outline:none; resize:none; min-height:50px; max-height:100px; touch-action:manipulation; -webkit-appearance:none; }
    #userInput::placeholder { color:var(--text-dim); }
    #userInput:focus { border-color:rgba(0,212,255,0.6); }
    #sendBtn { width:56px; height:50px; flex-shrink:0; background:rgba(0,212,255,0.1); border:2px solid var(--accent); border-radius:4px; color:var(--accent); font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
    #sendBtn:active { background:rgba(0,212,255,0.3); transform:scale(0.95); }
    #liveOverlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(2,10,20,0.97); flex-direction:column; align-items:center; justify-content:center; gap:24px; }
    #liveOverlay.active { display:flex; }
    .live-orb { width:160px; height:160px; border-radius:50%; border:2px solid var(--accent); background:radial-gradient(circle at 40% 35%,rgba(0,212,255,0.2),rgba(0,212,255,0.03)); display:flex; align-items:center; justify-content:center; font-size:60px; box-shadow:0 0 40px rgba(0,212,255,0.3); transition:all 0.3s; cursor:pointer; touch-action:manipulation; }
    .live-orb.listening { border-color:var(--accent); animation:orb-listen 1.4s ease-in-out infinite; }
    .live-orb.thinking { border-color:#ffd700; box-shadow:0 0 40px rgba(255,215,0,0.4); }
    .live-orb.speaking { border-color:var(--green); animation:orb-speak 0.5s ease-in-out infinite; }
    @keyframes orb-listen { 50% { transform:scale(1.06); box-shadow:0 0 70px rgba(0,212,255,0.6); } }
    @keyframes orb-speak { 50% { transform:scale(1.08); box-shadow:0 0 60px rgba(0,255,136,0.6); } }
    .live-label { font-family:'Orbitron',monospace; font-size:13px; letter-spacing:4px; color:var(--accent); }
    .live-text { font-size:13px; color:var(--text-dim); text-align:center; max-width:80%; line-height:1.6; }
    .btn-end { margin-top:10px; padding:12px 28px; border:1px solid rgba(0,212,255,0.3); background:none; color:var(--text-dim); font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:2px; border-radius:4px; cursor:pointer; touch-action:manipulation; }
    .btn-end:active { border-color:var(--accent); color:var(--accent); }
    .scan-line { position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.3; animation:scan 4s linear infinite; pointer-events:none; z-index:100; }
    @keyframes scan { from{top:0;opacity:0.3;} to{top:100%;opacity:0;} }
    #lockScreen { position:fixed; inset:0; z-index:999; background:#020a14; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
    #lockScreen.hidden { display:none; }
    .lock-title { font-family:'Orbitron',monospace; font-weight:900; font-size:22px; letter-spacing:5px; color:#00d4ff; text-shadow:0 0 20px rgba(0,212,255,0.5); }
    .lock-sub { font-size:11px; letter-spacing:2px; color:#4a7a99; }
    .lock-dots { display:flex; gap:12px; margin:10px 0; }
    .lock-dot { width:16px; height:16px; border-radius:50%; border:2px solid rgba(0,212,255,0.4); background:transparent; transition:all 0.2s; }
    .lock-dot.filled { background:#00d4ff; border-color:#00d4ff; box-shadow:0 0 10px rgba(0,212,255,0.6); }
    .lock-dot.error { background:#ff4444; border-color:#ff4444; }
    .lock-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:240px; }
    .lock-key { height:64px; border-radius:6px; border:1px solid rgba(0,212,255,0.25); background:rgba(0,212,255,0.05); color:#c8e8ff; font-family:'Orbitron',monospace; font-size:20px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; transition:all 0.15s; }
    .lock-key:active { background:rgba(0,212,255,0.2); transform:scale(0.93); box-shadow:0 0 15px rgba(0,212,255,0.3); }
    .lock-key.del { font-size:18px; color:#ff6b00; border-color:rgba(255,107,0,0.25); }
    .lock-error { font-size:11px; color:#ff4444; letter-spacing:2px; min-height:16px; }
    .lock-voice-btn { margin-top:6px; padding:14px 32px; border:1px solid rgba(0,212,255,0.35); background:rgba(0,212,255,0.06); border-radius:6px; color:#00d4ff; font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:2px; cursor:pointer; touch-action:manipulation; transition:all 0.15s; }
    .lock-voice-btn:active { background:rgba(0,212,255,0.2); transform:scale(0.96); }
    .lock-voice-btn.listening { border-color:#ff6b00; color:#ff6b00; background:rgba(255,107,0,0.1); animation:voice-pulse 1s ease-in-out infinite; }
    @keyframes voice-pulse { 0%,100% { box-shadow:0 0 10px rgba(255,107,0,0.3); } 50% { box-shadow:0 0 25px rgba(255,107,0,0.7); } }
    .lock-voice-status { font-size:10px; letter-spacing:2px; color:#4a7a99; min-height:14px; }
    #jarvis-camera { display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column; align-items:center; justify-content:center; }
    #jarvis-camera.active { display:flex; }
    #jarvis-camera video { width:100%; max-height:70vh; object-fit:cover; }
    #jarvis-camera canvas { display:none; }
    .cam-controls { display:flex; gap:20px; margin-top:16px; }
    .cam-btn { background:rgba(0,212,255,0.1); border:1px solid var(--accent); color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:2px; padding:12px 20px; cursor:pointer; text-transform:uppercase; touch-action:manipulation; }
    .cam-btn:active { background:rgba(0,212,255,0.3); }
    .cam-btn.capture { background:var(--accent); color:#020a14; font-weight:bold; }
    #jarvis-photo-preview { display:none; position:fixed; inset:0; background:rgba(2,10,20,0.95); z-index:10000; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
    #jarvis-photo-preview.active { display:flex; }
    #jarvis-photo-preview img { max-width:90vw; max-height:55vh; border:1px solid rgba(0,212,255,0.3); }
    #jarvis-photo-preview p { color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:1px; text-align:center; max-width:80vw; line-height:1.6; }
    #jarvis-location-badge { display:none; position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#020a14; border:1px solid rgba(0,212,255,0.4); color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:1px; padding:6px 14px; z-index:500; white-space:nowrap; }
  </style>
</head>
<body>
<div class="scan-line"></div>
<div id="lockScreen">
  <div class="lock-title">J.A.R.V.I.S</div>
  <div class="lock-sub">ENTER ACCESS CODE</div>
  <div class="lock-dots">
    <div class="lock-dot" id="d0"></div><div class="lock-dot" id="d1"></div><div class="lock-dot" id="d2"></div><div class="lock-dot" id="d3"></div><div class="lock-dot" id="d4"></div><div class="lock-dot" id="d5"></div>
  </div>
  <div class="lock-pad">
    <button class="lock-key" onclick="lockKey('1')">1</button>
    <button class="lock-key" onclick="lockKey('2')">2</button>
    <button class="lock-key" onclick="lockKey('3')">3</button>
    <button class="lock-key" onclick="lockKey('4')">4</button>
    <button class="lock-key" onclick="lockKey('5')">5</button>
    <button class="lock-key" onclick="lockKey('6')">6</button>
    <button class="lock-key" onclick="lockKey('7')">7</button>
    <button class="lock-key" onclick="lockKey('8')">8</button>
    <button class="lock-key" onclick="lockKey('9')">9</button>
    <button class="lock-key" onclick="lockKey('0')" style="grid-column:2">0</button>
    <button class="lock-key del" onclick="lockDel()">⌫</button>
  </div>
  <div class="lock-error" id="lockError"></div>
  <button class="lock-voice-btn" id="lockVoiceBtn" onclick="lockVoiceUnlock()">🎤 SPEAK CODE</button>
  <div class="lock-voice-status" id="lockVoiceStatus"></div>
</div>
<div id="liveOverlay">
  <div class="live-orb listening" id="liveOrb">🎙️</div>
  <div class="live-label" id="liveLabel">LISTENING…</div>
  <div class="live-text" id="liveText"></div>
  <button class="btn-end" id="endBtn">✕ END SESSION</button>
</div>
<div id="jarvis-camera">
  <video id="jarvis-video" autoplay playsinline muted></video>
  <canvas id="jarvis-canvas"></canvas>
  <div class="cam-controls">
    <button class="cam-btn" onclick="closeCamera()">✕ CLOSE</button>
    <button class="cam-btn capture" onclick="capturePhoto()">📸 CAPTURE</button>
    <button class="cam-btn" onclick="switchCamera()">🔄 FLIP</button>
  </div>
</div>
<div id="jarvis-photo-preview">
  <img id="jarvis-captured-img" src="" alt="Captured">
  <p id="jarvis-photo-analysis">Analyzing, Sir…</p>
  <div class="cam-controls">
    <button class="cam-btn" onclick="closePhotoPreview()">✕ CLOSE</button>
    <button class="cam-btn capture" onclick="analyzePhoto()">🔍 ANALYZE AGAIN</button>
  </div>
</div>
<div id="jarvis-location-badge">📍 <span id="jarvis-location-text">Locating…</span></div>
<header>
  <div class="logo">
    <div class="logo-ring"><div class="logo-dot"></div></div>
    <span class="logo-text">JARVIS</span>
  </div>
  <div class="status-badge">ONLINE</div>
</header>
<div id="messages">
  <div class="welcome">
    <div class="welcome-title">J.A.R.V.I.S</div>
    <div class="welcome-sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
    <div class="welcome-line"></div>
    <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;">READY FOR YOUR COMMAND</div>
    <div class="welcome-hint">🎤 TAP THE BIG BUTTON BELOW TO SPEAK</div>
  </div>
</div>
<footer>
  <button id="tapBtn" ontouchstart="handleTapStart(event)" ontouchend="handleTapEnd(event)" onclick="handleTapClick()">
    <span id="tapIcon">🎤</span><span id="tapLabel">TAP TO SPEAK</span>
  </button>
  <div class="text-row">
    <textarea id="userInput" placeholder="Or type here..." rows="1"></textarea>
    <button id="sendBtn" ontouchstart="" onclick="sendText()">⚡</button>
  </div>
      </footer>
