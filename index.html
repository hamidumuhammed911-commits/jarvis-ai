<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>JARVIS Hologram</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg:#020a14;
  --accent:#00d4ff;
  --accent2:#0066ff;
  --text:#c8e8ff;
  --dim:#4a7a9b;
  --glow:0 0 25px rgba(0,212,255,0.4);

  --font-ai:'Orbitron',sans-serif;
  --font-body:'Rajdhani',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:radial-gradient(circle at center,#071423,#020a14);
  color:var(--text);
  font-family:var(--font-body);
  overflow:hidden;
}

/* ───────── HUD LAYOUT ───────── */
.hud {
  display:flex;
  height:100vh;
  flex-direction:column;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  border-bottom:1px solid rgba(0,212,255,0.2);
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--dim);
}

/* CENTER HOLOGRAM */
.center {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* ORB */
.orb {
  width:160px;
  height:160px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(0,212,255,0.4),transparent 60%);
  border:2px solid var(--accent);
  box-shadow:0 0 40px rgba(0,212,255,0.3);
  position:relative;
  animation:float 3s ease-in-out infinite;
}

/* RINGS */
.orb::before,
.orb::after {
  content:"";
  position:absolute;
  inset:-40px;
  border-radius:50%;
  border:1px solid rgba(0,212,255,0.2);
  animation:spin 6s linear infinite;
}

.orb::after{
  inset:-80px;
  border:1px solid rgba(0,212,255,0.1);
  animation-duration:10s;
}

@keyframes spin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-12px); }
}

/* SCAN LINE */
.scanline {
  position:absolute;
  width:100%;
  height:2px;
  background:rgba(0,212,255,0.3);
  animation:scan 2.5s linear infinite;
}

@keyframes scan {
  0% { top:0; opacity:0; }
  50% { opacity:1; }
  100% { top:100%; opacity:0; }
}

/* CHAT PANEL */
.chat {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  max-height:180px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg{
  padding:8px 10px;
  border-radius:10px;
  font-size:13px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,212,255,0.2);
}

.user{
  align-self:flex-end;
  background:rgba(0,102,255,0.2);
}

.ai{
  align-self:flex-start;
  background:rgba(0,212,255,0.08);
}

/* INPUT */
.inputBar{
  display:flex;
  padding:10px;
  gap:8px;
  border-top:1px solid rgba(0,212,255,0.2);
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid rgba(0,212,255,0.2);
  background:rgba(0,0,0,0.3);
  color:white;
  font-family:var(--font-body);
}

button{
  width:40px;
  height:40px;
  border-radius:50%;
  border:1px solid rgba(0,212,255,0.3);
  background:rgba(0,212,255,0.1);
  color:var(--accent);
}

/* LISTENING MODE */
.listening .orb {
  box-shadow:0 0 80px rgba(255,50,50,0.5);
  border-color:red;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.08); }
}
</style>
</head>

<body>

<div class="hud">

  <!-- TOP -->
  <div class="topbar">
    <div>J.A.R.V.I.S CORE</div>
    <div id="status">ONLINE</div>
  </div>

  <!-- CENTER HOLOGRAM -->
  <div class="center" id="center">

    <div class="scanline"></div>

    <div class="orb" id="orb"></div>

    <!-- CHAT FLOAT -->
    <div class="chat" id="chat"></div>

  </div>

  <!-- INPUT -->
  <div class="inputBar">
    <input id="input" placeholder="Speak to JARVIS..."/>
    <button onclick="send()">➤</button>
    <button onclick="mic()">🎤</button>
  </div>

</div>

<script>
function addMsg(text,type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  document.getElementById("chat").appendChild(d);
}

/* SEND */
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text)return;

  addMsg(text,"user");
  input.value="";

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages:[{role:"user",content:text}]})
  });

  const data=await res.json();
  addMsg(data.reply,"ai");
}

/* MIC */
let rec;
function mic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return alert("No mic support");

  rec=new SR();
  rec.lang="en-US";

  document.body.classList.add("listening");

  rec.onresult=(e)=>{
    const text=e.results[0][0].transcript;
    document.getElementById("input").value=text;
    send();
  };

  rec.onend=()=>{
    document.body.classList.remove("listening");
  };

  rec.start();
}
</script>

</body>
</html>
