<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#020d1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>JARVIS — Stark Industries</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   TOKEN SYSTEM
══════════════════════════════════════════ */
:root {
  --bg-void:      #020d1a;
  --bg-deep:      #040f1f;
  --bg-panel:     #061628;
  --bg-card:      #071c33;
  --bg-card-alt:  #0a2240;

  --cyan-core:    #00d4ff;
  --cyan-bright:  #40e8ff;
  --cyan-dim:     #0099bb;
  --cyan-ghost:   rgba(0,212,255,0.08);
  --cyan-glow:    rgba(0,212,255,0.25);
  --cyan-border:  rgba(0,212,255,0.3);

  --arc-blue:     #1a6fff;
  --arc-glow:     rgba(26,111,255,0.4);

  --text-primary:   #c8f0ff;
  --text-secondary: #5a9ab5;
  --text-dim:       #2a5a72;
  --text-jarvis:    #00d4ff;
  --text-user:      #7ec8e3;

  --font-hud:   'Orbitron', monospace;
  --font-data:  'Share Tech Mono', monospace;
  --font-body:  'Rajdhani', sans-serif;

  --radius-sm:  4px;
  --radius-md:  8px;
  --radius-lg:  12px;

  --header-h:   72px;
  --footer-h:   80px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════
   SCANLINE OVERLAY — signature element
══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Corner frame brackets */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(var(--cyan-core), var(--cyan-core)) top left / 40px 2px no-repeat,
    linear-gradient(var(--cyan-core), var(--cyan-core)) top left / 2px 40px no-repeat,
    linear-gradient(var(--cyan-core), var(--cyan-core)) top right / 40px 2px no-repeat,
    linear-gradient(var(--cyan-core), var(--cyan-core)) top right / 2px 40px no-repeat,
    linear-gradient(var(--cyan-core), var(--cyan-core)) bottom left / 40px 2px no-repeat,
    linear-gradient(var(--cyan-core), var(--cyan-core)) bottom left / 2px 40px no-repeat,
    linear-gradient(var(--cyan-core), var(--cyan-core)) bottom right / 40px 2px no-repeat,
    linear-gradient(var(--cyan-core), var(--cyan-core)) bottom right / 2px 40px no-repeat;
  pointer-events: none;
  z-index: 9998;
  opacity: 0.6;
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  position: relative;
}

/* ══════════════════════════════════════════
   HEADER — HUD BAR
══════════════════════════════════════════ */
#hud-header {
  flex-shrink: 0;
  height: var(--header-h);
  background: linear-gradient(180deg, #030e1e 0%, var(--bg-deep) 100%);
  border-bottom: 1px solid var(--cyan-border);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 14px;
  position: relative;
  box-shadow: 0 2px 20px rgba(0,212,255,0.12);
}

/* Left cluster */
.hud-left {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.hud-sys-label {
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.hud-sys-status {
  font-family: var(--font-hud);
  font-size: 10px;
  font-weight: 700;
  color: var(--cyan-core);
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00ff88;
  animation: pulse-dot 2s ease-in-out infinite;
  box-shadow: 0 0 8px #00ff88;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

/* Center — JARVIS logo */
.hud-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.hud-logo {
  font-family: var(--font-hud);
  font-size: 22px;
  font-weight: 900;
  color: var(--cyan-core);
  letter-spacing: 8px;
  text-shadow: 0 0 20px var(--cyan-core), 0 0 40px rgba(0,212,255,0.4);
  line-height: 1;
}
.hud-subtitle {
  font-family: var(--font-data);
  font-size: 7px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Right cluster */
.hud-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
}
.hud-clock {
  font-family: var(--font-data);
  font-size: 14px;
  color: var(--cyan-core);
  letter-spacing: 2px;
}
.hud-date {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-secondary);
  letter-spacing: 1px;
}
.hud-version {
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* Animated bottom edge of header */
#hud-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 10%;
  right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-core), transparent);
  animation: scan-line 4s ease-in-out infinite;
}
@keyframes scan-line {
  0%,100% { left: 10%; right: 80%; opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  50% { left: 80%; right: 10%; }
}

/* ══════════════════════════════════════════
   CHAT AREA
══════════════════════════════════════════ */
#chat-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  position: relative;
}

/* Subtle radial glow behind chat */
#chat-area::before {
  content: '';
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,212,255,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

#chat-area::-webkit-scrollbar { width: 3px; }
#chat-area::-webkit-scrollbar-track { background: transparent; }
#chat-area::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 2px; }

/* ── Message bubbles ── */
.msg-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  animation: msg-in 0.3s cubic-bezier(0.34,1.2,0.64,1) both;
  position: relative;
  z-index: 1;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-label {
  font-family: var(--font-data);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 4px;
}

/* JARVIS bubble */
.msg-row.jarvis .msg-label { color: var(--cyan-dim); }
.msg-row.jarvis .msg-bubble {
  background: linear-gradient(135deg, #061c30 0%, #071828 100%);
  border: 1px solid var(--cyan-border);
  border-left: 3px solid var(--cyan-core);
  border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
  padding: 12px 14px;
  max-width: 86%;
  align-self: flex-start;
  position: relative;
  box-shadow: 0 0 20px rgba(0,212,255,0.08), inset 0 1px 0 rgba(0,212,255,0.1);
}
.msg-row.jarvis .msg-bubble::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--cyan-core), transparent);
  border-radius: var(--radius-sm);
}
.msg-row.jarvis .msg-text {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.5;
  letter-spacing: 0.3px;
}
/* Arc reactor icon on JARVIS messages */
.msg-row.jarvis .msg-bubble::after {
  content: '◈';
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 10px;
  color: var(--cyan-dim);
  opacity: 0.4;
}

/* User bubble */
.msg-row.user {
  align-items: flex-end;
}
.msg-row.user .msg-label { color: var(--arc-blue); text-align: right; }
.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, #0d2040 0%, #0a1a35 100%);
  border: 1px solid rgba(26,111,255,0.35);
  border-right: 3px solid var(--arc-blue);
  border-radius: var(--radius-lg) 0 var(--radius-lg) var(--radius-lg);
  padding: 12px 14px;
  max-width: 82%;
  align-self: flex-end;
  position: relative;
  box-shadow: 0 0 16px rgba(26,111,255,0.1), inset 0 1px 0 rgba(26,111,255,0.15);
}
.msg-row.user .msg-bubble::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--arc-blue));
}
.msg-row.user .msg-text {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  color: var(--text-user);
  line-height: 1.5;
  letter-spacing: 0.3px;
}

/* Timestamp */
.msg-time {
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-dim);
  padding: 0 6px;
  letter-spacing: 1px;
}

/* ── Thinking indicator ── */
.thinking-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  animation: msg-in 0.3s ease both;
}
.thinking-label {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--cyan-dim);
  letter-spacing: 2px;
}
.thinking-dots {
  display: flex;
  gap: 5px;
}
.thinking-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--cyan-core);
  animation: dot-bounce 1.2s ease-in-out infinite;
  box-shadow: 0 0 6px var(--cyan-core);
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce {
  0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ── Divider ── */
.session-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 0;
}
.session-divider::before, .session-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--text-dim));
}
.session-divider::after {
  background: linear-gradient(90deg, var(--text-dim), transparent);
}
.session-divider span {
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 2px;
  white-space: nowrap;
}

/* ══════════════════════════════════════════
   FOOTER — INPUT BAR
══════════════════════════════════════════ */
#input-bar {
  flex-shrink: 0;
  background: linear-gradient(0deg, #030e1e 0%, var(--bg-deep) 100%);
  border-top: 1px solid var(--cyan-border);
  padding: 10px 12px 12px;
  box-shadow: 0 -2px 20px rgba(0,212,255,0.1);
}

.input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

/* Mic button */
#mic-btn {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  border: 1px solid var(--cyan-border);
  background: var(--bg-card);
  color: var(--cyan-core);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
#mic-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--cyan-ghost);
  opacity: 0;
  transition: opacity 0.2s;
}
#mic-btn:active::before, #mic-btn.listening::before { opacity: 1; }
#mic-btn.listening {
  border-color: var(--cyan-core);
  box-shadow: 0 0 12px var(--cyan-glow), inset 0 0 12px var(--cyan-ghost);
  animation: mic-pulse 1s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%,100% { box-shadow: 0 0 12px var(--cyan-glow); }
  50% { box-shadow: 0 0 24px var(--cyan-core), 0 0 40px var(--cyan-glow); }
}

/* Text input */
.input-wrapper {
  flex: 1;
  position: relative;
}
#user-input {
  width: 100%;
  height: 44px;
  background: var(--bg-card);
  border: 1px solid var(--cyan-border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  padding: 0 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  letter-spacing: 0.3px;
}
#user-input::placeholder {
  color: var(--text-dim);
  font-style: italic;
  font-size: 13px;
  letter-spacing: 1px;
}
#user-input:focus {
  border-color: var(--cyan-core);
  box-shadow: 0 0 0 1px rgba(0,212,255,0.15), 0 0 12px rgba(0,212,255,0.1);
}
/* Animated left accent on focus */
#user-input:focus + .input-accent { opacity: 1; }
.input-accent {
  position: absolute;
  left: -1px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--cyan-core);
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.2s;
  box-shadow: 0 0 6px var(--cyan-core);
}

/* Send button */
#send-btn {
  width: 60px;
  height: 44px;
  border-radius: var(--radius-md);
  border: 1px solid var(--cyan-border);
  background: linear-gradient(135deg, #082a45, #061c2e);
  color: var(--cyan-core);
  font-family: var(--font-hud);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
#send-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,212,255,0.15), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
#send-btn:hover::before, #send-btn:active::before { opacity: 1; }
#send-btn:active { transform: scale(0.97); }

/* Live voice button */
#live-btn {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  border: 1px solid rgba(26,111,255,0.35);
  background: var(--bg-card);
  color: var(--arc-blue);
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}
#live-btn:active {
  background: rgba(26,111,255,0.1);
  border-color: var(--arc-blue);
}

/* ── Status bar ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2px;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.status-item .dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text-dim);
}
.status-item.active .dot {
  background: #00ff88;
  box-shadow: 0 0 6px #00ff88;
}
.status-item.active { color: var(--text-secondary); }

/* ══════════════════════════════════════════
   PASSCODE LOCK SCREEN
══════════════════════════════════════════ */
#lock-screen {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #010b17;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
}
#lock-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
  );
}
.lock-logo {
  font-family: var(--font-hud);
  font-size: 36px;
  font-weight: 900;
  color: var(--cyan-core);
  letter-spacing: 10px;
  text-shadow: 0 0 30px var(--cyan-core), 0 0 60px rgba(0,212,255,0.3);
  animation: glow-breathe 3s ease-in-out infinite;
}
@keyframes glow-breathe {
  0%,100% { text-shadow: 0 0 20px var(--cyan-core), 0 0 40px rgba(0,212,255,0.3); }
  50% { text-shadow: 0 0 40px var(--cyan-core), 0 0 80px rgba(0,212,255,0.5), 0 0 120px rgba(0,212,255,0.2); }
}
.lock-sub {
  font-family: var(--font-data);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: -20px;
}
.lock-prompt {
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 2px;
  text-align: center;
}
.pin-dots {
  display: flex;
  gap: 14px;
}
.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1px solid var(--cyan-border);
  background: transparent;
  transition: all 0.2s;
}
.pin-dot.filled {
  background: var(--cyan-core);
  box-shadow: 0 0 12px var(--cyan-core);
  border-color: var(--cyan-core);
}
.pin-dot.error {
  background: #ff3366;
  box-shadow: 0 0 12px #ff3366;
  border-color: #ff3366;
}
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 72px);
  gap: 10px;
}
.num-key {
  height: 56px;
  border-radius: var(--radius-md);
  border: 1px solid var(--cyan-border);
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: var(--font-hud);
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  position: relative;
  overflow: hidden;
}
.num-key .sub { font-family: var(--font-data); font-size: 7px; color: var(--text-dim); letter-spacing: 1px; }
.num-key:active {
  background: var(--cyan-ghost);
  border-color: var(--cyan-core);
  transform: scale(0.95);
  box-shadow: 0 0 12px var(--cyan-glow);
}
.num-key.del { color: var(--cyan-dim); font-size: 14px; }
.num-key.empty { pointer-events: none; opacity: 0; }

/* ══════════════════════════════════════════
   LIVE VOICE OVERLAY
══════════════════════════════════════════ */
#voice-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(1,11,23,0.97);
  backdrop-filter: blur(8px);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
}
#voice-overlay.active { display: flex; }

.voice-state-label {
  font-family: var(--font-hud);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--text-secondary);
  text-transform: uppercase;
}
#voice-state-text {
  font-family: var(--font-hud);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--cyan-core);
  text-shadow: 0 0 20px var(--cyan-core);
  min-width: 160px;
  text-align: center;
}

/* Arc reactor ring */
.arc-ring-container {
  position: relative;
  width: 160px;
  height: 160px;
}
.arc-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid transparent;
}
.arc-ring-1 {
  border-color: var(--cyan-core);
  animation: ring-spin 3s linear infinite;
  border-top-color: transparent;
  border-right-color: transparent;
  box-shadow: 0 0 20px var(--cyan-core);
}
.arc-ring-2 {
  inset: 12px;
  border-color: var(--arc-blue);
  animation: ring-spin 2s linear infinite reverse;
  border-bottom-color: transparent;
  border-left-color: transparent;
}
.arc-ring-3 {
  inset: 24px;
  border-color: rgba(0,212,255,0.4);
  animation: ring-spin 4s linear infinite;
  border-top-color: transparent;
}
@keyframes ring-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.arc-core {
  position: absolute;
  inset: 36px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.3) 0%, rgba(26,111,255,0.15) 50%, transparent 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: core-breathe 2s ease-in-out infinite;
}
@keyframes core-breathe {
  0%,100% { box-shadow: 0 0 20px var(--cyan-glow); }
  50% { box-shadow: 0 0 40px var(--cyan-core), 0 0 60px var(--arc-glow); }
}
.arc-icon {
  font-size: 32px;
  color: var(--cyan-core);
  text-shadow: 0 0 20px var(--cyan-core);
}

/* Voice transcript display */
#voice-transcript {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text-secondary);
  text-align: center;
  max-width: 280px;
  min-height: 44px;
  line-height: 1.5;
  font-style: italic;
  letter-spacing: 0.3px;
}
