<style id="live-voice-css">
/* ── Live Voice Button (Gemini-style) ── */
.live-voice-btn {
  position: fixed;
  bottom: 110px;
  right: 20px;
  z-index: 999;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: linear-gradient(135deg, #0a2a3a, #001520);
  border: 2px solid #00d4ff44;
  box-shadow: 0 0 20px #00d4ff22, 0 4px 15px rgba(0,0,0,0.5);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: all 0.3s;
  color: #00d4ff;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 0.5px;
}
.live-voice-btn:hover { transform: scale(1.05); border-color: #00d4ff88; }
.live-voice-btn svg { width: 24px; height: 24px; }
.live-voice-btn.lv-active {
  background: linear-gradient(135deg, #003a1a, #001a0a);
  border-color: #00ff8888;
  box-shadow: 0 0 30px #00ff8844, 0 0 60px #00ff8822;
  animation: lv-pulse 1.5s ease-in-out infinite;
}
.live-voice-btn.lv-thinking {
  background: linear-gradient(135deg, #2a1500, #150a00);
  border-color: #ffaa0088;
  box-shadow: 0 0 30px #ffaa0044;
  animation: lv-spin-border 1s linear infinite;
}
@keyframes lv-pulse {
  0%, 100% { box-shadow: 0 0 20px #00ff8844, 0 0 40px #00ff8822; }
  50% { box-shadow: 0 0 40px #00ff8888, 0 0 80px #00ff8844; }
}
@keyframes lv-spin-border {
  0% { box-shadow: 0 0 20px #ffaa0044, 4px 0 15px #ffaa0066; }
  25% { box-shadow: 0 0 20px #ffaa0044, 0 4px 15px #ffaa0066; }
  50% { box-shadow: 0 0 20px #ffaa0044, -4px 0 15px #ffaa0066; }
  75% { box-shadow: 0 0 20px #ffaa0044, 0 -4px 15px #ffaa0066; }
  100% { box-shadow: 0 0 20px #ffaa0044, 4px 0 15px #ffaa0066; }
}

/* ── Live Voice Overlay ── */
.lv-overlay {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: rgba(2, 10, 20, 0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  backdrop-filter: blur(20px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.lv-overlay.lv-open {
  opacity: 1;
  pointer-events: all;
}

/* Central animated orb */
.lv-orb {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #003a5a, #001020);
  border: 2px solid #00d4ff33;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.5s;
}
.lv-orb::before, .lv-orb::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 1px solid #00d4ff22;
  animation: lv-ring 3s linear infinite;
}
.lv-orb::before { width: 200px; height: 200px; animation-delay: 0s; }
.lv-orb::after  { width: 250px; height: 250px; animation-delay: 1s; }
@keyframes lv-ring {
  0% { transform: scale(0.9); opacity: 0.6; }
  100% { transform: scale(1.2); opacity: 0; }
}
.lv-orb.lv-orb-listening {
  background: radial-gradient(circle at 35% 35%, #004a2a, #001508);
  border-color: #00ff8866;
  box-shadow: 0 0 60px #00ff8833;
}
.lv-orb.lv-orb-thinking {
  background: radial-gradient(circle at 35% 35%, #3a2500, #150d00);
  border-color: #ffaa0066;
  box-shadow: 0 0 60px #ffaa0033;
}
.lv-orb.lv-orb-speaking {
  background: radial-gradient(circle at 35% 35%, #001a3a, #000a20);
  border-color: #00d4ff88;
  box-shadow: 0 0 80px #00d4ff44;
  animation: lv-orb-speak 0.8s ease-in-out infinite alternate;
}
@keyframes lv-orb-speak {
  from { transform: scale(1); }
  to   { transform: scale(1.05); }
}

/* Voice bars inside orb */
.lv-bars {
  display: flex;
  gap: 5px;
  align-items: center;
  height: 48px;
}
.lv-bar {
  width: 5px;
  border-radius: 3px;
  background: #00d4ff;
  height: 8px;
  transition: height 0.1s;
}
.lv-orb-listening .lv-bar { background: #00ff88; animation: lv-bar-dance 0.5s ease-in-out infinite alternate; }
.lv-orb-thinking  .lv-bar { background: #ffaa00; animation: lv-bar-think 1s ease-in-out infinite; }
.lv-orb-speaking  .lv-bar { background: #00d4ff; animation: lv-bar-speak 0.4s ease-in-out infinite alternate; }

@keyframes lv-bar-dance {
  from { height: 8px; }
  to   { height: 48px; }
}
@keyframes lv-bar-think {
  0%, 100% { height: 8px; opacity: 0.4; }
  50% { height: 28px; opacity: 1; }
}
@keyframes lv-bar-speak {
  from { height: 12px; }
  to   { height: 44px; }
}
/* Stagger each bar */
.lv-bar:nth-child(1) { animation-delay: 0s; }
.lv-bar:nth-child(2) { animation-delay: 0.08s; }
.lv-bar:nth-child(3) { animation-delay: 0.16s; }
.lv-bar:nth-child(4) { animation-delay: 0.24s; }
.lv-bar:nth-child(5) { animation-delay: 0.32s; }
.lv-bar:nth-child(6) { animation-delay: 0.40s; }
.lv-bar:nth-child(7) { animation-delay: 0.16s; }

/* Status text */
.lv-status {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  letter-spacing: 3px;
  color: #00d4ffcc;
  text-align: center;
  min-height: 20px;
}
.lv-transcript {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  color: #88ccee;
  text-align: center;
  max-width: 320px;
  min-height: 48px;
  line-height: 1.5;
  padding: 0 24px;
  font-style: italic;
}

/* Close button */
.lv-close {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #0a2030;
  border: 1px solid #00d4ff33;
  color: #00d4ff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.lv-close:hover { background: #1a3040; border-color: #00d4ff88; }

/* Mute button */
.lv-mute {
  padding: 10px 28px;
  border-radius: 30px;
  background: #0a2030;
  border: 1px solid #00d4ff33;
  color: #00d4ff99;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.lv-mute:hover { border-color: #00d4ff88; color: #00d4ff; }
.lv-mute.muted { border-color: #ff444488; color: #ff4444; }
</style>

<!-- ── LIVE VOICE JS ── paste before </body> ─────────────────── -->
<script>
// ════════════════════════════════════════════════════════════
//  JARVIS LIVE VOICE — Gemini-style hands-free loop
//  State machine: idle → listening → thinking → speaking → listening
// ════════════════════════════════════════════════════════════

const LV = {
  active: false,
  muted: false,
  state: 'idle', // idle | listening | thinking | speaking
  rec: null,
  synth: window.speechSynthesis,
  voiceObj: null,
  silenceTimer: null,
  interimText: '',
};

// ── Pick best female voice (same logic as your existing TTS) ──
function lvPickVoice() {
  const voices = LV.synth.getVoices();
  const preferred = [
    'Google UK English Female', 'Microsoft Zira', 'Karen', 'Samantha',
    'Victoria', 'Fiona', 'Moira', 'Tessa', 'Google US English'
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name.includes(name));
    if (v) { LV.voiceObj = v; return; }
  }
  LV.voiceObj = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'))
             || voices.find(v => v.lang.startsWith('en'))
             || voices[0];
}

if (LV.synth.onvoiceschanged !== undefined) {
  LV.synth.onvoiceschanged = lvPickVoice;
}
lvPickVoice();

// ── UI state helpers ──
function lvSetState(state) {
  LV.state = state;
  const orb    = document.getElementById('lvOrb');
  const status = document.getElementById('lvStatus');
  const btn    = document.getElementById('lvBtn');

  orb.className = 'lv-orb';
  btn.className = 'live-voice-btn';

  const map = {
    listening: { orbClass: 'lv-orb-listening', status: '🎙 LISTENING...', btnClass: 'lv-active' },
    thinking:  { orbClass: 'lv-orb-thinking',  status: '⚡ PROCESSING...',  btnClass: 'lv-thinking' },
    speaking:  { orbClass: 'lv-orb-speaking',  status: '🔊 JARVIS SPEAKING', btnClass: 'lv-active' },
    idle:      { orbClass: '',                 status: 'TAP LIVE TO BEGIN', btnClass: '' },
  };
  const s = map[state] || map.idle;
  if (s.orbClass) orb.classList.add(s.orbClass);
  if (s.btnClass) btn.classList.add(s.btnClass);
  status.textContent = s.status;
}

function lvSetTranscript(text) {
  document.getElementById('lvTranscript').textContent = text;
}

// ── Open / close overlay ──
function lvToggle() {
  if (LV.active) { lvStop(); return; }
  lvStart();
}

function lvStart() {
  LV.active = true;
  document.getElementById('lvOverlay').classList.add('lv-open');
  lvPickVoice();
  lvSetState('idle');
  lvSetTranscript('');
  // Small delay so the animation feels intentional
  setTimeout(() => lvListen(), 600);
}

function lvStop() {
  LV.active = false;
  LV.synth.cancel();
  if (LV.rec) { try { LV.rec.stop(); } catch(e){} LV.rec = null; }
  clearTimeout(LV.silenceTimer);
  document.getElementById('lvOverlay').classList.remove('lv-open');
  document.getElementById('lvBtn').className = 'live-voice-btn';
  lvSetState('idle');
}

// ── Toggle mute ──
function lvToggleMute() {
  LV.muted = !LV.muted;
  const btn = document.getElementById('lvMuteBtn');
  btn.textContent = LV.muted ? '🔇 UNMUTE JARVIS' : '🔊 MUTE JARVIS';
  btn.classList.toggle('muted', LV.muted);
}

// ── LISTEN phase ──
function lvListen() {
  if (!LV.active) return;
  
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    lvSetTranscript('Speech recognition not supported on this browser.');
    return;
  }

  LV.synth.cancel(); // stop any ongoing speech
  lvSetState('listening');
  lvSetTranscript('');

  const rec = new SR();
  LV.rec = rec;
  rec.lang = 'en-US';
  rec.interimResults = true;
  rec.continuous = false;
  rec.maxAlternatives = 1;

  let finalTranscript = '';

  rec.onstart = () => {
    lvSetState('listening');
  };

  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    lvSetTranscript(finalTranscript || interim);

    // Reset silence timer on speech
    clearTimeout(LV.silenceTimer);
    if (finalTranscript) {
      // Got a final result — wait briefly then process
      LV.silenceTimer = setTimeout(() => {
        if (LV.rec) { try { LV.rec.stop(); } catch(e){} }
      }, 400);
    }
  };

  rec.onend = () => {
    LV.rec = null;
    if (!LV.active) return;
    const text = finalTranscript.trim();
    if (text) {
      lvProcess(text);
    } else {
      // No speech detected — loop back after brief pause
      lvSetTranscript('');
      setTimeout(() => { if (LV.active) lvListen(); }, 800);
    }
  };

  rec.onerror = (e) => {
    LV.rec = null;
    if (!LV.active) return;
    // "no-speech" is normal, just re-listen
    if (e.error === 'no-speech' || e.error === 'aborted') {
      setTimeout(() => { if (LV.active) lvListen(); }, 500);
    } else {
      lvSetTranscript(`Mic error: ${e.error}. Retrying...`);
      setTimeout(() => { if (LV.active) lvListen(); }, 2000);
    }
  };

  try { rec.start(); } catch(e) { LV.rec = null; }
}

// ── PROCESS phase — call your existing Groq API ──
async function lvProcess(userText) {
  if (!LV.active) return;
  lvSetState('thinking');
  lvSetTranscript(`"${userText}"`);

  // Re-use your existing history array if available, else create local one
  const histArr = (typeof history !== 'undefined') ? history : [];

  // Add to history
  histArr.push({ role: 'user', content: userText });

  // Also add to main chat UI if addMsg exists
  if (typeof addMsg === 'function') addMsg('user', userText);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: userText,
        history: histArr.slice(-10) // last 10 for context
      })
    });

    const data = await res.json();
    const reply = data.reply || data.message || data.content || 'I did not catch that, Sir.';

    histArr.push({ role: 'assistant', content: reply });
    if (typeof addMsg === 'function') addMsg('assistant', reply);

    lvSpeak(reply);
  } catch (err) {
    console.error('JARVIS Live Voice API error:', err);
    lvSpeak("I'm having trouble connecting, Sir. Please check the network.");
  }
}

// ── SPEAK phase ──
function lvSpeak(text) {
  if (!LV.active) return;
  lvSetState('speaking');
  lvSetTranscript(text);

  if (LV.muted) {
    // Skip TTS, go straight back to listening
    setTimeout(() => { if (LV.active) lvListen(); }, 800);
    return;
  }

  LV.synth.cancel();

  const utt = new SpeechSynthesisUtterance(text);
  utt.voice = LV.voiceObj;
  utt.rate  = 0.95;
  utt.pitch = 1.05;
  utt.volume = 1;

  utt.onend = () => {
    if (!LV.active) return;
    // Brief pause after JARVIS speaks, then listen again
    setTimeout(() => { if (LV.active) lvListen(); }, 600);
  };

  utt.onerror = () => {
    if (!LV.active) return;
    setTimeout(() => { if (LV.active) lvListen(); }, 600);
  };

  LV.synth.speak(utt);

  // Fallback in case onend doesn't fire (mobile Safari bug)
  const duration = Math.max(text.length * 65, 2000);
  setTimeout(() => {
    if (LV.active && LV.state === 'speaking') {
      LV.synth.cancel();
      lvListen();
    }
  }, duration + 1500);
}

// ── PWA Service Worker registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => {
      console.log('SW registration skipped:', err);
    });
  });
}
</script>
<!-- ── end LIVE VOICE JS ──────────────────────────────────────── -->
