<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#020a14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JARVIS" />
  <link rel="manifest" href="/manifest.json" />
  <title>JARVIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020a14;
      --bg2: #040f1e;
      --accent: #00d4ff;
      --accent2: #0088cc;
      --accent3: #ff6b00;
      --text: #c8e8ff;
      --text-dim: #4a7a99;
      --glow: 0 0 20px rgba(0,212,255,0.4);
      --glow-strong: 0 0 40px rgba(0,212,255,0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow behind header */
    body::after {
      content: '';
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 14px 20px 10px;
      border-bottom: 1px solid rgba(0,212,255,0.15);
      background: rgba(2,10,20,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-ring {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glow);
      position: relative;
      animation: spin-ring 8s linear infinite;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border: 1px solid rgba(0,212,255,0.3);
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: var(--glow-strong);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes spin-ring {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    .logo-text {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 4px;
      color: var(--accent);
      text-shadow: var(--glow);
    }

    .status-badge {
      font-size: 10px;
      color: var(--accent);
      border: 1px solid rgba(0,212,255,0.3);
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 1px;
      animation: blink-border 3s ease-in-out infinite;
    }

    @keyframes blink-border {
      0%, 100% { border-color: rgba(0,212,255,0.3); }
      50% { border-color: rgba(0,212,255,0.8); box-shadow: 0 0 8px rgba(0,212,255,0.3); }
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 2px; }

    .msg {
      max-width: 88%;
      animation: msg-in 0.3s ease-out;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; }
    .msg.ai { align-self: flex-start; }

    .msg-label {
      font-size: 9px;
      letter-spacing: 2px;
      margin-bottom: 4px;
      opacity: 0.5;
    }

    .msg.user .msg-label { text-align: right; color: var(--accent3); }
    .msg.ai .msg-label { color: var(--accent); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 2px;
      line-height: 1.6;
      font-size: 13.5px;
      position: relative;
    }

    .msg.user .msg-bubble {
      background: rgba(255,107,0,0.1);
      border: 1px solid rgba(255,107,0,0.25);
      border-right: 3px solid var(--accent3);
      color: #ffd4a8;
    }

    .msg.ai .msg-bubble {
      background: rgba(0,212,255,0.05);
      border: 1px solid rgba(0,212,255,0.2);
      border-left: 3px solid var(--accent);
      color: var(--text);
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: think 1.2s ease-in-out infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes think {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px var(--accent); }
    }

    /* ── WELCOME ── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.6;
    }

    .welcome-title {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--glow-strong);
      letter-spacing: 6px;
      margin-bottom: 8px;
    }

    .welcome-sub {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .welcome-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 16px auto;
    }

    /* ── INPUT AREA ── */
    footer {
      position: relative;
      z-index: 10;
      padding: 12px 16px 20px;
      border-top: 1px solid rgba(0,212,255,0.15);
      background: rgba(2,10,20,0.97);
      backdrop-filter: blur(10px);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    #userInput {
      width: 100%;
      background: rgba(0,212,255,0.04);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      padding: 11px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 100px;
      min-height: 44px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #userInput:focus {
      border-color: rgba(0,212,255,0.5);
      box-shadow: 0 0 12px rgba(0,212,255,0.1);
    }

    #userInput::placeholder { color: var(--text-dim); }

    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 2px;
      border: 1px solid var(--accent);
      background: rgba(0,212,255,0.08);
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(0,212,255,0.15);
    }

    .btn-send:active {
      background: rgba(0,212,255,0.2);
      box-shadow: var(--glow);
      transform: scale(0.95);
    }

    .btn-send:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-voice {
      width: 44px;
      height: 44px;
      border-radius: 2px;
      border: 1px solid rgba(255,107,0,0.4);
      background: rgba(255,107,0,0.06);
      color: var(--accent3);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-voice.listening {
      border-color: var(--accent3);
      background: rgba(255,107,0,0.15);
      box-shadow: 0 0 16px rgba(255,107,0,0.4);
      animation: voice-pulse 1s ease-in-out infinite;
    }

    @keyframes voice-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255,107,0,0.3); }
      50% { box-shadow: 0 0 24px rgba(255,107,0,0.7); }
    }

    .btn-voice:active { transform: scale(0.95); }

    /* Scan line effect */
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
      animation: scan 4s linear infinite;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes scan {
      from { top: 0; opacity: 0.4; }
      to { top: 100%; opacity: 0; }
    }

    /* corner decorations */
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      opacity: 0.4;
      z-index: 5;
    }
    .corner.tl { top: 8px; left: 8px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner.tr { top: 8px; right: 8px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
    .corner.bl { bottom: 8px; left: 8px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner.br { bottom: 8px; right: 8px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }
  </style>
</head>
<body>

  <div class="scan-line"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <header>
    <div class="logo">
      <div class="logo-ring"><div class="logo-dot"></div></div>
      <span class="logo-text">JARVIS</span>
    </div>
    <div class="status-badge">ONLINE</div>
  </header>

  <div id="messages">
    <div class="welcome">
      <div class="welcome-title">J.A.R.V.I.S</div>
      <div class="welcome-sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
      <div class="welcome-line"></div>
      <div style="font-size:11px; color: var(--text-dim); letter-spacing:1px;">READY FOR YOUR COMMAND</div>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <button class="btn-voice" id="voiceBtn" title="Voice input">🎤</button>
      <div class="input-wrap">
        <textarea id="userInput" rows="1" placeholder="Enter command..."></textarea>
      </div>
      <button class="btn-send" id="sendBtn" title="Send">⚡</button>
    </div>
  </footer>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');

    const SYSTEM_PROMPT = `You are JARVIS, a highly intelligent AI assistant. You are precise, helpful, and slightly formal but friendly. Keep responses concise and clear. You may use brief markdown-style formatting where helpful.`;

    let conversationHistory = [];
    let isListening = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    });

    // Send on Enter (not Shift+Enter)
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    function addMessage(role, text) {
      // Remove welcome screen on first message
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
      div.innerHTML = `
        <div class="msg-label">${role === 'user' ? 'YOU' : 'JARVIS'}</div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
      `;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addThinking() {
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = 'msg ai';
      div.innerHTML = `
        <div class="msg-label">JARVIS</div>
        <div class="msg-bubble thinking"><span></span><span></span><span></span></div>
      `;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      const thinkingEl = addThinking();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: conversationHistory,
            system: SYSTEM_PROMPT
          })
        });

        const data = await res.json();
        thinkingEl.remove();

        if (data.reply) {
          addMessage('ai', data.reply);
          conversationHistory.push({ role: 'assistant', content: data.reply });
        } else {
          addMessage('ai', 'ERROR: ' + (data.error || 'Unknown error occurred.'));
        }
      } catch (err) {
        thinkingEl.remove();
        addMessage('ai', 'CONNECTION ERROR: Unable to reach server.');
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    // Voice input
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;

      recognition.onresult = (e) => {
        inputEl.value = e.results[0][0].transcript;
        inputEl.dispatchEvent(new Event('input'));
      };

      recognition.onend = () => {
        isListening = false;
        voiceBtn.classList.remove('listening');
      };

      voiceBtn.addEventListener('click', () => {
        if (isListening) {
          recognition.stop();
        } else {
          recognition.start();
          isListening = true;
          voiceBtn.classList.add('listening');
        }
      });
    } else {
      voiceBtn.style.opacity = '0.3';
      voiceBtn.title = 'Voice not supported in this browser';
    }
  </script>
</body>
</html>
